f est maintenu pendant sa durée d'effet.","53":"Autres Changements","54":"Les PV du 'Cristal de la Forêt' apparaissant dans la Forêt du Duel du serveur Ilseom&Baldo ont été ajustés.","55":"Le cycle de réapparition du monstre Raid 'Slime Noyau' apparaissant à l'intérieur du Campement des Orcs Turek a été augmenté.","56":"La zone d'apparition du Slime Lien apparaissant dans les zones de chasse concernées a été étendue.","57":"[Serveur Principal] Avis de Mise à Jour du 19 février (jeu)","58":"Fabrication Spéciale - Serveur Eva&Wolf&Valakas","59":"Des produits fabricables au coût de 'Renforçateur de Teinture' et 'Adena' jusqu'à la maintenance programmée du 4 mars 2026 (mer) ont été ajoutés.","60":"Fabrication Spéciale - Serveur Eva&Wolf&Valakas/Ilseom&Baldo","61":"Un produit limité au serveur, fabricable au coût de 'Adena' jusqu'à la maintenance programmée du 25 février 2026 (mer), a été ajouté.","62":"Les produits à fabrication limitée par serveur sont également utilisables sur le Serveur Monde. (Limite de fabrication propre au Serveur Monde appliquée)","63":"Les objets à durée limitée obtenus via la Fabrication Spéciale feront l'objet d'une suppression groupée lors de la maintenance programmée du 4 mars 2026 (mer).","64":"Des effets ont été ajoutés aux buffs suivants.","65":"Le réglage d'agressivité des monstres événementiels a été modifié.","66":"Ajout du réglage d'agressivité pour 'Guerrier Centaure' et 'Tireur Centaure'","67":"Augmentation de la portée d'agressivité de 'Loup de Tempête', 'Guerrier Centaure' et 'Tireur Centaure'","68":"La vitesse de déplacement du Coursier Rouge et du Cheval Blanc a été augmentée.","69":"La visibilité du Coursier Rouge et du Cheval Blanc a été améliorée.","70":"Événement - Slime Géant","71":"De la maintenance programmée du 19 février 2026 (jeu) jusqu'au 25 février 2026 (mer), le 'Slime Géant' apparaît avec l'Orc Géant lors de la bataille de forteresse quotidienne.","72":"Chaque fois que les PV du Slime Géant diminuent d'un certain %, le premier attaquant obtient 1 'Pierre d'Invocation de Slime Noyau (à durée limitée) [Scellé]' ; lors de sa défaite, le dernier attaquant peut obtenir 2 'Pierre d'Invocation de Slime Noyau (à durée limitée)'.","73":"L'objet 'Pierre d'Invocation de Slime Noyau (à durée limitée) [Scellé]' n'est utilisable que dans le 'Donjon de Transcendance / Donjon d'Entraînement / Terrain d'Épreuve de Levenhart' ; à l'invocation, le 'Slime Noyau' apparaît et sa défaite octroie des récompenses.","74":"L'objet 'Pierre d'Invocation de Slime Noyau (à durée limitée) [Scellé]' sera supprimé lors de la maintenance programmée du 25 février 2026 (mer).","75":"1 Mission d'événement réalisable pendant la période de l'événement a été ajoutée.","76":"Objet","77":"L'objet 'Récompense du Roi des Esprits (à durée limitée) [Scellé]' est passé de coffre à bon d'échange.","78":"La date de suppression a également été modifiée : il sera supprimé lors de la maintenance programmée du 25 février 2026 (mer).","79":"Le contenu est le suivant.","80":"Les objets Ark octroyés par les missions 'Exploration du Monde Onirique' et 'Conquête de la Bataille de Forteresse Orc' sont devenus des objets à durée limitée supprimés à chaque maintenance programmée hebdomadaire.","81":"[Serveur Principal] Avis de Mise à Jour du 25 février (mer)","82":"5 produits fabricables avec divers coûts jusqu'à la maintenance programmée du 11 mars 2026 (mer) ont été ajoutés.","83":"2 produits de parchemins de bénédiction, fabricables au coût de 'Adena' du 1er mars 2026 (dim) à 00h jusqu'à la maintenance programmée du 11 mars (mer), ont été ajoutés.","84":"Événement - Émargement (Serveur Eva&Wolf&Valakas/Ilseom&Baldo)","85":"L'événement Émargement se déroule jusqu'à la maintenance programmée du 25 mars 2026 (mer).","86":"Le contenu et les frais de certains coffres (packs) et bons d'échange ont été ajustés.","87":"Les objets à durée limitée et les compétences de buff obtenus via l'Émargement feront l'objet d'une suppression groupée lors de la maintenance programmée du 25 mars 2026 (mer).","88":"Invasion de la Légion des Ténèbres - Serveur Principal/Eva&Wolf&Valakas","89":"'1 Mission Invasion de la Légion des Ténèbres a été ajoutée.","90":"'Bourse de Pièces d'Ébène (à durée limitée) [Scellé]' sera utilisable après la maintenance programmée du 11 mars 2026 (mer), date d'ouverture de la Guerre de Serveurs.","91":"La 'Pièce d'Ébène [Scellé]' obtenable dans la 'Bourse de Pièces d'Ébène (à durée limitée) [Scellé]' est une récompense de la Guerre de Serveurs prévue pour la mise à jour du 11 mars ; une occasion de l'obtenir à l'avance est offerte via la mission d'élimination du boss de la Légion des Ténèbres, avant la mise à jour officielle.","92":"L'utilisation de la 'Pièce d'Ébène [Scellé]' sera dévoilée après la mise à jour de la Guerre de Serveurs.","93":"'Bourse de Pièces d'Ébène (à durée limitée) [Scellé]' fera l'objet d'une suppression groupée lors de la maintenance programmée du 25 mars 2026 (mer).","94":"Invasion de la Légion des Ténèbres - Serveur Ilseom&Baldo","95":"Cardinal/Saint d'Eva/Saint de Shilien","96":"Les effets et le type de la compétence 'Fast Cover' ont été modifiés.","97":"Une nouvelle compétence ultime 'Fast Cover: Life Saver', utilisable en commun par les classes de soigneur, a été ajoutée.","98":"Au niveau 76, la compétence peut être apprise via le 'Grimoire Supérieur'.","99":"Combat de Boss Kain","100":"Le Raid Printessa est terminé et le Combat de Boss Kain a été ajouté.","101":"L'entrée se fait via le gardien de donjon 'Erdo' au village du Château d'Aden.","102":"Le boss 'Kain Van Halter' charge les cibles éloignées et utilise des compétences de zone aux schémas variés.","103":"Après l'entrée dans la zone d'instance, la défaite du boss 'Kain Van Halter, Seigneur de la Citadelle d'Ébène' assigne le donjon.","104":"La mission s'achève en parlant au PNJ Erdo qui apparaît après la défaite du monstre boss concerné.","105":"Sur le serveur Ilseom&Baldo, seul le boss de la phase 1 apparaît ; le boss de la phase 2 sera ajouté lors d'une mise à jour ultérieure.","106":"Death Knight","107":"Les niveaux des compétences de buff 'Call of Flame/Freezing/Lightning' ont été étendus et les effets des débuffs des compétences déclenchées 'Death Flame/Freezing/Lightning' ont été modifiés.","108":"Dominator","109":"Les buffs utilisés directement ont été simplifiés et leurs effets ajustés.","110":"Les compétences doivent être apprises directement dans la fenêtre de compétences pour pouvoir être utilisées.","111":"Les compétences ci-dessous ont été supprimées.","112":"Les SP et objets consommés pour les compétences supprimées sont versés à l'entrepôt personnel.","113":"Doomcryer","114":"Le problème de droits de butin mal configurés sur le boss Raid du Port de Giran des serveurs Eva/Wolf/Valakas a été corrigé.","115":"Tous les utilisateurs ayant participé au Raid disposent des droits de butin, quelle que soit leur contribution.","116":"Le problème d'affichage erroné du message d'obtention de Poupée lorsque le message de réussite d'obtention de points par utilisation d'élixir s'affiche à l'écran a été corrigé.","117":"La Bataille d'Anéantissement de la Légion des Ténèbres est terminée.","118":"Pour un appariement de groupe plus fluide, le temps de réutilisation de l'annonce d'appariement de groupe a été ajusté à 1 minute 30 secondes.","119":"[Serveur Principal] Avis de Mise à Jour du 4 mars (mer)","120":"Boutique L2 - Serveur Eva&Wolf&Valakas/Ilseom&Baldo","121":"De nouveaux produits ont été ajoutés à la Boutique L2.","122":"En utilisant l'objet 'Parfum du Printemps (à durée limitée) [Scellé]', vous pouvez obtenir les objets de la liste suivante de façon garantie & aléatoire.","123":"En utilisant l'objet 'Coffre de Tourbillon (à durée limitée)', vous pouvez obtenir aléatoirement 1 objet parmi la liste suivante.","124":"En utilisant l'objet 'Coffre de Brise (à durée limitée)', vous pouvez obtenir aléatoirement 1 objet parmi la liste suivante.","125":"En utilisant l'objet Cristal du Vent [Scellé]', vous pouvez choisir et échanger dans la liste ci-dessous.","126":"En utilisant l'objet Essence du Vent', vous pouvez obtenir les effets de buff ci-dessous pendant 20 minutes.","127":"4 produits fabricables au coût de divers objets jusqu'à la maintenance programmée du 18 mars 2026 (mer) ont été ajoutés.","128":"Les objets à durée limitée obtenus via la Fabrication Spéciale feront l'objet d'une suppression groupée lors de la maintenance programmée du 25 mars 2026 (mer).","129":"Serveur Eva&Wolf&Valakas/Ilseom&Baldo","130":"'En utilisant l'objet 'Coffre au Trésor d'Aden [Scellé]', vous pouvez obtenir aléatoirement 1 objet parmi la liste suivante.","131":"En utilisant l'objet 'Pièce du Banquet des Illusions (à durée limitée) [Scellé]', vous pouvez choisir et échanger dans la liste ci-dessous.","132":"L'objet 'Pièce du Banquet des Illusions (à durée limitée) [Scellé]' fera l'objet d'une suppression groupée lors de la maintenance programmée du 25 mars 2026 (mer).","133":"Le parchemin d'enchantement des objets Boucle d'Oreille d'Eva, Boucle d'Oreille de Shilen, Anneau de Saiha, Anneau de Pa'agrio et Collier d'Einhasad est devenu le 'Parchemin d'Enchantement de Bijou'.","134":"Les objets 'Parchemin d'Enchantement d'Accessoire [Scellé]' détenus ont été remplacés en masse par 'Parchemin d'Enchantement de Bijou [Scellé]'.","135":"Serveur Eva&Wolf&Valakas","136":"Nom du produit","137":"Objet fabriqué","138":"Coût de fabrication","139":"Parchemin d'Enchantement d'Accessoire Rare (à durée limitée)","140":"Parchemin d'Enchantement d'Accessoire Rare (à durée limitée) 1 unité","141":"1 type obtenu parmi","142":"Serveur Ilseom&Baldo","143":"En utilisant l'objet 'Coffre de Consommables du Printemps (à durée limitée) [Scellé]', vous obtenez de façon garantie les objets de la liste suivante.","144":"En utilisant l'objet 'Coffre de Parchemins d'Enchantement Bénis d'Arme/Armure (à durée limitée) [Scellé]', vous pouvez obtenir aléatoirement 1 objet parmi  pouvoir parler au bouton suivant.","161":"En parlant à un bouton de fleur en train d'éclore, une abeille ou un frelon royal est invoqué selon les probabilités.","162":"'Kain Van Halter' utilise désormais correctement sa compétence de charge.","163":"Les dégâts de la compétence de charge ont été réduits.","164":"Don au Clan","165":"Le nombre maximal quotidien de dons au Clan est modifié.","166":"Suite à la modification du nombre maximal de dons, l'expérience de Clan obtenue pour les dons avancés et supérieurs est modifiée.","167":"Le problème d'affichage anormal de la carte du monde lors de l'entrée dans la zone de chasse spéciale 'Ruines Antiques - Caverne d'Antharas' a été corrigé.","168":"La compétence 'Cœur de Lame de la Tempête' indiquait un effet qui ne fonctionnait pas réellement ; cette mention a été retirée.","169":"La compétence 'Marche Nocturne des Cent Démons' n'indiquait pas son nombre d'attaques ; cette information a été ajoutée.","170":"Le problème d'absence d'indication de l'objet consommé (Cristal Magique) pour la compétence 'Avalanche - Carnage Play' a été corrigé.","171":"Le Carquois Infini (sans grade~grade A) et l'Elemental Orb (sans grade~grade A) sont fusionnés en un objet unique chacun : Carquois Infini et Elemental Orb.","172":"Les objets Carquois Infini et Elemental Orb de chaque grade octroyés au cours de la progression du personnage sont désormais octroyés une seule fois, sous leur forme unifiée, au premier moment où ils sont nécessaires.","173":"[Correction] [Serveur Principal] Avis de Mise à Jour du 11 mars (mer)","174":"Fabrication Spéciale - Serveur Ilseom&Baldo","175":"Des produits fabricables au coût de 'Adena' jusqu'à la maintenance programmée du 25 mars 2026 (mer) ont été ajoutés.","176":"Serveur Ilseom/Baldo","177":"Coût de fabrication (renforcement +1)","178":"Coût de fabrication (renforcement +2)","179":"Coût de fabrication (renforcement +3)","180":"'L'objet 'Bourse de Pièces d'Ébène [Scellé]' octroyé par la mission Invasion de la Légion des Ténèbres est désormais utilisable.","181":"En utilisant l'objet 'Bourse de Pièces d'Ébène [Scellé]', vous pouvez obtenir aléatoirement 1 objet parmi ceux ci-dessous.","182":"Événement - Changement de Classe","183":"De nouveaux produits liés au changement de Classe, achetables jusqu'à la maintenance programmée du 1er avril 2026 (mer), ont été ajoutés à la Boutique L2.","184":"Arme Dragon - Fabrication Spéciale","185":"Des types d'arme ont été ajoutés au 'Coffre Dragon' permettant d'obtenir une 'Arme Dragon'.","186":"Les types d'arme ajoutés sont au nombre de 7 : épée à deux mains/lance/hache/masse magique/épées jumelles/arme à feu/rapière.","187":"Les bons d'échange permettent d'échanger contre un coffre correspondant à chaque type d'arme.","188":"7 Armes Dragon ont été ajoutées à la liste d'échange de l'objet 'Orbe d'Immortalité Raffiné'.","189":"Les objets supplémentaires obtenables via le Bon d'Échange de Coffre d'Arme Dragon sont les suivants.","190":"14 produits 'Changement d'Apparence d'Arme Dragon', fabricables au coût de divers objets, ont été ajoutés.","191":"Fin des Sièges de Monde et de Serveur","192":"Les contenus liés au Siège ont été supprimés du Serveur Principal.","193":"Les taxes du Château de Giran accumulées jusqu'à la maintenance programmée ainsi que l'Adena conservée dans le coffre du château ont été versées au chef de clan.","194":"Guerre de Serveurs","195":"Une Guerre de Serveurs réunissant jusqu'à 4 serveurs a été ajoutée.","196":"Les serveurs appariés partagent le contenu et le classement de la Guerre de Serveurs ; la composition des groupes de serveurs appariés est la suivante.","197":"La Guerre de Serveurs se déroule pendant une semaine, du mercredi 06h30 au mercredi suivant 00h00.","198":"De 00h00 à 06h30 le mercredi a lieu la période de comptabilisation du classement ; les points de Guerre de Serveurs obtenus durant ce créneau ne sont pas pris en compte dans le classement.","199":"Au début d'un nouveau cycle, chaque serveur du groupe apparié se voit attribuer un id de légion, conservé pendant toute la durée du cycle.","200":"Les classements par serveur et individuels sont déterminés par les points de Guerre de Serveurs obtenus durant la semaine.","201":"Cape de la Légion","202":"L'objet existant 'Cape d'Aden [Scellé]' est devenu 'Cape de la Légion [Scellé]'.","203":"Les objets 'Cape d'Aden [Scellé]' déjà détenus ont été remplacés par 'Cape de la Légion'.","204":"Lorsque l'objet 'Cape de la Légion [Scellé]' est équipé, les effets ci-dessous s'appliquent selon son niveau de renforcement.","205":"Pour les classes Crow, Assassin et Haut Elfe, l'apparence exclusive de la 'Cape de la Légion' ne s'applique pas lors de l'équipement de la 'Cape de la Légion'.","206":"Le renforcement de la 'Cape de la Légion' s'effectue via le 'Parchemin d'Enchantement de Cape de la Légion'.","207":"Les objets 'Parchemin d'Enchantement de Cape d'Aden' déjà détenus ont été remplacés par 'Parchemin d'Enchantement de Cape de la Légion'.","208":"Poupée","209":"De nouvelles Poupées ont été ajoutées.","210":"La Poupée 'Kain, Chef de la Légion des Ténèbres' ne peut pas être obtenue par fusion.","211":"Une nouvelle collection de Poupées a été ajoutée.","212":"L'effet de la compétence [Terreur d'Ébène] utilisée par les monstres subalternes, qui les faisait fuir dans la direction opposée, a été modifié pour un déplacement dans une direction aléatoire.","213":"Le problème de perte d'expérience survenant parfois lors d'une mort dans la Citadelle d'Ébène a été corrigé.","214":"Doombringer","215":"De nouvelles capacités de combat ont été ajoutées à la classe Doombringer.","216":"La compétence 'Shine/Shadow Soul Finding' a été améliorée.","217":"Le nom de la compétence 'Shine/Shadow Soul Finding' est devenu 'Shine/Shadow Soul Affinity'.","218":"'Shine/Shadow Soul Affinity' est devenue une compétence de buff, ce qui supprime la perte de DPS.","219":"Modification commune aux classes 'Doombringer' et 'Soul Hound'.","220":"La compétence 'Shine/Shadow Side' a été améliorée.","221":"Modification du mode de transformation","222":"Déclenchement d'[Overwhelming Force] lors de l'utilisation d'une compétence","223":"→ Déclenchement d'[Overwhelming Force] avec 2% de probabilité lors d'une attaque","224":"Overwhelming Force","225":"Une nouvelle compétence de rang [Légendaire] a été ajoutée.","226":"L'apprentissage de la compétence consomme [Grimoire - Overwhelming Power: Master].","227":"Overwhelming Force: Master","228":"Probabilité de critique des compétences physiques +20%","229":"Dégâts critiques des compétences physiques +20%","230":"Vitesse de déplacement +20","231":"Durée : 13 secondes","232":"10% de probabilité de renouveler la durée lors de l'élimination d'un PC","233":"Déclenchement d'une frappe supplémentaire lors de l'utilisation des compétences Force - Soul Smash / Force - Soul Impact","234":"Soul Hound","235":"Le style de combat de la classe Soul Hound a été modifié.","236":"Lors de l'utilisation d'une compétence d'attaque, [Frappe de Lame] ou [Foudre] se déclenche selon une probabilité définie.","237":"[Frappe de Lame] et [Foudre] sont considérées comme des dégâts magiques.","238":"La paralysie (choc électrique) ne peut pas s'appliquer consécutivement et sa durée est de 3 secondes.","239":"Les dégâts sont infligés même si la paralysie (choc électrique) ne s'applique pas.","240":"En état [Shine Transform] ou [Shadow Transform], la puissance de [Frappe de Lame] et de [Foudre] augmente.","241":"Tatouage","242":"Jusqu'à la maintenance programmée du 1er avril 2026 (mer), un événement de gratuité des frais de gravure et d'extraction de tatouage se déroule, toutes Classes confondues.","243":"Quelle que soit la Classe, des objets 'Bon de Changement de Teinture (à durée limitée) [Scellé]' sont octroyés en nombre égal aux teintures actuellement enregistrées.","244":"Lors de l'extraction d'une teinture échangeable, une teinture échangeable est extraite.","245":"Lors de l'extraction d'une teinture non échangeable, une teinture non échangeable est extraite.","246":"Le Bon de Changement de Teinture ne peut pas être transféré au sein du compte.","247":"Le Bon de Changement de Teinture fera l'objet d'une suppression groupée lors de la maintenance programmée du 01/04/2026 (mer).","248":"Récompenses de Raid","249":"Les nouveaux grimoires légendaires 'Grimoire - Overwhelming Power: Master' et 'Grimoire - Overcharge: Master' sont droppés par les boss suivants.","250":"Mission","251":"Le 'Coffre de Bon d'Échange de Munitions Élémentaires du Donjon de Transcendance' a été retiré de la liste des récompenses de la mission quotidienne 'Percée du Donjon de Transcendance'.","252":"Interface de la fenêtre de contacts","253":"L'interface de la fenêtre de contacts a été améliorée.","254":"L'ordre des onglets a été corrigé.","255":"Les boutons envoi de courrier/chuchotement/conversation privée en bas de la fenêtre de contacts ont été retirés, et des onglets chuchotement/courrier ont été ajoutés dans la liste d'amis.","256":"La conversation privée peut être lancée en double-cliquant sur le nom d'un ami dans la liste d'amis.","257":"L'arrière-plan, les icônes, les boutons, etc. ont été améliorés pour une meilleure lisibilité.","258":"L'objet 'Pierre de Recharge de Temps de la Forêt du Vent [Scellé]' a été ajouté aux listes de vente du marchand général et du marchand spécial.","259":"Le problème du personnage qui se déplaçait lors du clic sur l'icône d'utilisation automatique de potion a été corrigé.","260":"Le problème d'incohérence entre la quantité des objets cumulables affichée dans la rubrique des objets obtenus du rapport de jeu et la quantité indiquée dans l'infobulle au survol de la souris a été corrigé.","261":"Le problème de diminution occasionnelle de l'Adena lors du retour du Serveur Monde vers le serveur d'origine a été corrigé.","262":"Le problème d'affichage de l'interface d'extraction lors d'un changement de Classe, même en l'absence de compétence extractible, a été corrigé.","263":"Le problème d'absence occasionnelle d'octroi de la récompense du dernier coup sur Luciano dans le Repaire Secret de la Mafia a été corrigé.","264":"[Correction] [Serveur Principal] Avis de Mise à Jour du 18 mars (mer)","265":"Eva/Wolf/Valakas","266":"Zone de chasse concernée","267":"Cimetière Royal d'Aden","268":"Marais du Dragon de Feu","269":"Mirage Fantastique","270":"Garnison de Cell Mahum_Renforcée","271":"Garnison de Kru Mahum","272":"Ilseom/Baldo","273":"Jusqu'à la maintenance programmée du 25 mars 2026 (mer), la défaite de certains monstres apparaissant dans les zones de chasse ci-dessous permet d'obtenir, selon une certaine probabilité, l'objet 'Coffre Surprise Mystère (à durée limitée)'.","274":"Eva/Wolf/Valakas/Ilseom/Baldo","275":"Les objets 'Coffre Surprise Mystère (à durée limitée)' et 'Ticket Mystère (à durée limitée) [Scellé]' obtenus lors de l'événement seront supprimés lors de la maintenance programmée du 1er avril 2026 (mer).","276":"Temple de Cyrax - Serveur Ilseom/Baldo","277":"Sur le serveur Ilseom/Baldo, le donjon d'appariement monde 'Temple de Cyrax' se déroule chaque jour à 22h30.","278":"Le 'Temple de Cyrax' est accessible à l'heure d'entrée via le HUD de notification ou via zone de chasse spéciale → Monde.","279":"Après l'entrée, le contenu démarre lorsque 5 personnes sont réunies par appariement aléatoire dans la salle d'attente.","280":"Si l'effectif est insuffisant une fois l'heure d'entrée expirée, vous pouvez parler à 'Mignon' pour choisir de poursuivre le contenu ou de sortir.","281":"Former un groupe avec les personnes appariées permet d'obtenir un bonus de groupe.","282":"Après le début du donjon, une partie des PNJ scellés est descellée toutes les 2 minutes et devient attaquable.","283":"Événement - Coffre Surprise Mystère","284":"L'événement 'Coffre Surprise Mystère' se déroule jusqu'à la maintenance programmée du 25 mars 2026 (mer).","285":"Chaque jour à 22h, l'événement Raid 'Coffre Mystère' se déroule.","2 veur a été corrigé.","304":"Un message à l'écran indiquant comment obtenir les récompenses s'affiche désormais lors de la validation du classement à la fin du match.","305":"Le problème d'indication erronée de la période d'obtention des récompenses a été corrigé.","306":"Classe","307":"La compétence 'Shine/Shadow Soul Gathering' des classes Doombringer, Soul Hound et Trickster a été corrigée.","308":"La mention manquante 'Temps de réutilisation fixe' a été ajoutée.","309":"Le délai de déclenchement de l'effet de la compétence a été réduit","310":"L'efficacité de la compétence 'Soul Affinity' du Doombringer et du Soul Hound a été augmentée.","311":"La puissance d'attaque de la compétence 'Overwhelming Power' a été augmentée.","312":"Un bonus de dégâts PVE +3% a été ajouté à la compétence 'Symbol of Kamael'.","313":"La visibilité de l'effet 'Marque de l'Âme' de '+1~+2 Soul Sign' a été améliorée.","314":"Le problème d'absence d'effet d'agrandissement sur les épées à deux mains lors de l'utilisation de la compétence 'Overwhelming Force: Master' a été corrigé.","315":"Le problème d'absence d'effet visuel lors de l'utilisation de '+3 Soul Sign' a été corrigé.","316":"Le problème d'application incorrecte des cibles des compétences 'Soul Prison' et 'Force – Soul Prison' a été corrigé.","317":"Soul Hound","318":"L'effet 'Soul Bind', qui empêche le retour de la cible d'une attaque PVP pendant 2 secondes, a été ajouté à la compétence 'Leopold'.","319":"Lors de l'utilisation de la compétence 'Leopold: Master', la probabilité de base de réussite de 'Soul Bind' sur une cible PVP est augmentée.","320":"L'ancienne 'Soul Snatch' devient 'Soul Defense'.","321":"Le niveau d'apprentissage de l'ancienne 'Soul Snatch' est conservé tel quel.","322":"Un effet de puissance d'attaque +1000 a été ajouté à 'Soul Expert'.","323":"Le problème de réglage incorrect de la portée de la compétence 'Flesh – Transcendance' a été corrigé.","324":"La mention <Précautions> relative à la réinitialisation des compétences dans l'infobulle de l'objet 'Bon de Changement de Classe (à durée limitée) [Scellé]' a été renforcée.","325":"Les compétences apprises jusqu'à présent moyennant un coût ne sont pas supprimées ; en revenant à la Classe précédente, vous retrouvez vos compétences telles qu'enregistrées.","326":"Le problème d'impossibilité d'inviter un ami dans le Clan depuis la fenêtre de contacts a été corrigé.","327":"Le problème d'affichage d'un message erroné lors de la connexion/déconnexion d'un ami a été corrigé.","328":"Les coordonnées de téléportation de la Bambouseraie de Horon ont été séparées en 2 destinations selon la difficulté de la zone de chasse : 'Bambouseraie de Horon' et 'Profondeurs de la Bambouseraie de Horon'.","329":"La description de la compétence 'True Death Knight: Master' a été complétée.","330":"[Serveur Principal] Avis de Mise à Jour du 25 mars (mer)","331":"L'événement Émargement se déroule jusqu'à la maintenance programmée du 22 avril 2026 (mer).","332":"Les objets à durée limitée et les compétences de buff obtenus via l'Émargement feront l'objet d'une suppression groupée lors de la maintenance programmée du 22 avril 2026 (mer).","333":"Collection - Serveur Eva&Wolf&Valakas/Ilseom&Baldo","334":"Les effets des 3 Collections événementielles du Livre de Collection Scellé, qui débutent le 1er avril, seront modifiés comme suit.","335":"La Collection à durée déterminée est une Collection événementielle réinitialisée le 1er de chaque mois à 06:30.","336":"Le Livre de Collection Scellé peut être renforcé avec le 'Parchemin d'Enchantement de Bijou [Scellé]'.","337":"Talisman de Hellbound - Transcendance","338":"L'objet 'Talisman de Hellbound - Transcendance' a été ajouté.","339":"Il peut être obtenu par fusion, selon les probabilités, à partir de 2 objets 'Talisman de Hellbound Lv10' ou d'une 'Pierre de Renforcement de Transcendance'.","340":"L'objet 'Talisman de Hellbound - Transcendance' est échangeable via la Bourse Mondiale en Adena/Elcoin.","341":"Les capacités de l'objet 'Talisman de Hellbound - Transcendance' par niveau d'enchantement sont les suivantes.","343":"La compétence 'Hell Fire' a été renforcée comme suit.","344":"La 'frappe supplémentaire' infligée aux ennemis portant la 'Marque de la Mort' a été renforcée comme suit.","345":"La 'frappe supplémentaire' des compétences 'Burning Field', 'Freezing Area', 'Lightning Storm' et 'Burning/Freezing/Lightning Hell' a été renforcée comme suit.","346":"L'effet 'dégâts des compétences de zone' a été ajouté à la compétence 'Death Roar'.","347":"Soul Hound/Doombringer/Trickster","348":"Parmi les effets des compétences de la classe Soul Hound, ceux liés à la 'probabilité de critique des compétences magiques de frappe supplémentaire' ont été renforcés.","349":"Compétences concernées : Thrust, Flesh, Rapier Slash, Chain Lightning, Crescent Arc","350":"Le problème permettant de se déplacer via le partage de position alors que la compétence 'Soul Bind' était active a été corrigé.","351":"La maniabilité des compétences 'Overwhelming Force' et 'Overwhelming Force: Master' a été modifiée.","352":"Le délai de redéclenchement des compétences 'Overwhelming Force' et 'Overwhelming Force: Master' a été ajusté à 14 secondes.","353":"Le nombre de renouvellements lors de l'élimination d'un PC passe à 1 et la probabilité de renouvellement est portée de 10% à 50%.","354":"Zone de chasse - Caverne des Géants","355":"La difficulté de la Caverne des Géants est augmentée et, en conséquence, l'expérience obtenue est accrue.","356":"De nouvelles zones sont ajoutées à la liste de téléportation.","357":"Suite à l'ajout de nouvelles zones de téléportation, 2 options de déplacement vers l'intérieur sont retirées de la liste de téléportation du 'dispositif de téléportation' situé à l'entrée de la Caverne des Géants.","358":"Des monstres supplémentaires sont placés dans les profondeurs de la Caverne des Géants.","359":"Certaines quêtes liées à la Caverne des Géants sont supprimées. La liste des quêtes supprimées est la suivante.","360":"Si vous aviez ces quêtes en cours, leur progression est supprimée et vous pouvez accepter la quête 'La Colline du Moulin Occupée par les Fées 1'.","361":"Invasion de Monstres","362":"Les zones d'apparition de l'Invasion de Monstres sur le serveur Ilseom/Baldo sont désormais identiques à celles du Serveur Principal.","363":"L'effectif d'appariement de la Bataille pour la Citadelle d'Ébène a été ajusté.","364":"À l'entrée dans la zone de chasse de la Citadelle d'Ébène et dans la Bataille pour la Citadelle d'Ébène, le buff 'Blessing of Legion', qui protège les buffs en cas de mort, est octroyé.","365":"L'objet Red Ark octroyé aléatoirement dans le château intérieur de la Bataille pour la Citadelle d'Ébène a été supprimé ; le PNJ 'Red Ark' apparaît désormais à intervalles réguliers après l'apparition de 'Kain, Chef de la Légion des Ténèbres'.","366":"Des Intendants de la Citadelle ont été placés en plus dans les zones périphérie/château extérieur de la zone de chasse de la Citadelle d'Ébène.","367":"Il n'est plus possible d'entrer dans la zone de chasse de la Citadelle d'Ébène en étant en groupe.","368":"L'heure d'entrée de la Bataille pour la Citadelle d'Ébène s'affiche désormais correctement dans l'interface des zones de chasse spéciales.","369":"Raid","370":"Lors des Raids Antharas et Valakas, le 'Red Ark' n'est plus octroyé en fonction de la baisse des PV.","371":"Une mission achevable en parlant à l'Ermite ou à Feldmar, qui apparaissent après la participation au Raid Antharas, a été ajoutée.","372":"Une mission achevable en parlant à Herphah, qui apparaît après la participation au Raid Valakas, a été ajoutée.","373":"Événement - Sanctuaire du Seigneur de l'Aube","374":"L'événement 'Sanctuaire du Seigneur de l'Aube' se déroule jusqu'à la maintenance programmée du 15 avril 2026 (mer).","375":"Vous pouvez entrer dans le donjon événementiel 'Sanctuaire du Seigneur de l'Aube' via le PNJ événementiel 'Arpe' au village du Château de Giran.","376":"Il se compose de 5 zones au total ; l'achèvement d'une zone permet de passer à la suivante.","377":"Après l'entrée dans le donjon, en parlant au PNJ 'Solina', vous pouvez commencer.","378":"En parlant à la Statue de l'Aube, l'un des quatre buffs s'applique ; il est dissipé à la sortie.","379":"Événement - Rune Magique","380":"L'événement 'Rune Magique' se déroule jusqu'à la maintenance programmée du 15 avril 2026 (mer).","381":"Pendant la période de l'événement, 2 objets d'événement sont achetables dans la Boutique L2.","382":"Les objets 'Fragment de Rune Magique (à durée limitée) [Scellé]' et 'Rune Magique Lv1 (à durée limitée) [Scellé]' seront supprimés lors de la maintenance programmée du 15 avril 2026 (mer).","383":"L'objet 'Rune Magique (à durée limitée) [Scellé]' peut être fusionné avec 'Fragment de Rune Magique (à durée limitée) [Scellé]' pour être amélioré en 'Rune Magique' de niveau supérieur.","384":"Détenir une Rune Magique permet d'obtenir un buff.","385":"Événement - Coffre Mystère","386":"Les 'Coffre Surprise Mystère (à durée limitée)' détenus sont devenus 'Bon d'Échange de Coffre Surprise Mystère (à durée limitée)'.","387":"En utilisant le 'Bon d'Échange de Coffre Surprise Mystère (à durée limitée)', vous pouvez l'échanger contre un 'Coffre Surprise Mystère (à durée limitée) [Scellé]'.","388":"En utilisant le 'Coffre Surprise Mystère (à durée limitée) [Scellé]', vous pouvez obtenir 1 objet parmi ceux ci-dessous, selon le serveur.","389":"Les objets à durée limitée obtenus lors de l'événement seront supprimés lors de la maintenance programmée du 15 avril 2026 (mer).","390":"L'objet Bon d'Invocation de Poupée (Héroïque) - 1 fois (à durée limitée) [Scellé] sera supprimé lors de la maintenance programmée du 22 avril 2026 (mer).","391":"Clan","392":"Les personnages (pets/invocations compris) appartenant au même groupe ou à la même alliance qu'un membre de Clan hostile passent en état d'hostilité temporaire.","393":"Les relations d'hostilité temporaire s'appliquent de la même manière que les relations d'hostilité existantes.","394":"Former un groupe/une alliance avec un Clan hostile fait apparaître la marque à une épée / marque à deux épées indiquant un Clan hostile.","395":"Après avoir formé un groupe/une alliance avec un Clan hostile, toute tentative d'action offensive déclenche une attaque immédiate.","396":"La catégorie des produits fabriqués au coût de 'Bon d'Invocation de Poupée - 1 fois' et d'Adena est devenue <Renforcement/Progression>.","397":"Les produits de la catégorie Fabrication Spéciale → Événement étaient répartis en nombreux petits ensembles ; ils ont été regroupés par emplacement de contenu.","398":"Le problème d'inopérance des fonctions de zoom avant et arrière de la carte radar en ville a été corrigé.","399":"La visibilité des icônes de détérioration d'Arme/Armure a été améliorée.","400":"La Forêt du Miroir est retirée de la liste de téléportation.","401":"[Serveur Principal] Avis de Mise à Jour du 1er avril (mer)","402":"Serveur Principal/Eva/Valakas","403":"Bambouseraie de Horon, Repaire des Ombres, Marais du Dragon de Feu, Forteresse de Silenoi, Territoire Occupé par les Fées,","404":"Cimetière Royal d'Aden, Garnison de Kru Mahum, Base Militaire de Morgos, Oasis des Terres Désolées, Caverne des Géants","405":"Les objets 'à durée limitée' obtenus lors de l'événement feront l'objet d'une suppression groupée lors de la maintenance programmée du 29 avril 2026 (mer).","406":"Zone de chasse - Garnison de Cell Mahum","407":"La zone Baraquement d'Élite de Cell Mahum a été ajoutée.","408":"Le déplacement vers la nouvelle zone est possible via l'interface de téléportation.","409":"Les monstres concernés sont nouvellement placés dans la zone Baraquement d'Élite de Cell Mahum.","410":"Suite à la refonte en zone Baraquement d'Élite de Cell Mahum, les Raids Kuka et Zisla ont été supprimés.","411":"L'expérience et l'équilibrage des monstres de la Garnison de Cell Mahum ont été renfor asse concernées sont les suivantes.","443":"L'utilisation de l'objet 'Certificat d'Immortalité (à durée limitée)' obtenu procure les effets suivants.","444":"2 Collections à durée déterminée ont été ajoutées à la catégorie Événement.","445":"Les 2 Collections événementielles sont disponibles jusqu'à la maintenance programmée du 29 avril 2026 (mer).","446":"Fusion","447":"À partir de 2 objets '+10 Bon d'Échange d'Agathion Élémentaire (à durée limitée) [Scellé]', vous pouvez obtenir par fusion, selon les probabilités, l'objet 'Coffre d'Agathion Roi des Esprits (à durée limitée) [Scellé]'.","448":"En utilisant l'objet 'Coffre d'Agathion Roi des Esprits (à durée limitée) [Scellé]', vous pouvez obtenir aléatoirement 1 objet parmi la liste suivante.","449":"L'événement 'Terrain d'Épreuve de Levenhart' se déroule jusqu'à la maintenance programmée du 29 avril 2026 (mer).","450":"Lorsqu'ils sont vaincus, les monstres évolués de niveau 1 à 5 peuvent évoluer vers un monstre de niveau supérieur selon une probabilité définie.","451":"Au début de l'événement, des monstres 'Membre de l'Ordre de Kamen' apparaissent, ainsi qu'un 'Révélateur de Kamen' à intervalles réguliers.","452":"Agathion Roi des Esprits","453":"Les statistiques de certains Agathions Rois des Esprits ont été augmentées.","454":"Petram, Roi des Esprits de la Terre","455":"Statistique modifiée","456":"Avant modification","457":"Après modification","458":"Earth Guard","459":"Durée 5 secondes","460":"Durée 10 secondes","461":"De nouvelles statistiques ont été ajoutées à l'Agathion Ignis, Roi des Esprits du Feu","462":"Ignis, Roi des Esprits du Feu","463":"Statistique supplémentaire","464":"Niveau","465":"Valeur de la statistique","466":"Dégâts des compétences de zone","467":"0","468":"3%","469":"La transformation en Gardien du Royaume a été ajoutée comme avantage pour la 1re place du classement individuel de la Guerre de Serveurs.","470":"Au début d'un nouveau cycle, la compétence de transformation en Gardien du Royaume est octroyée au personnage 1er du classement individuel de la Guerre de Serveurs du cycle précédent.","471":"Durée 5 minutes / Temps de réutilisation 60 minutes","472":"Cette compétence ne peut pas être utilisée en état de transformation Dragon Slayer.","473":"Une récompense d'échec d'appariement a été ajoutée pour la Bataille pour la Citadelle d'Ébène.","474":"En cas d'échec de l'appariement, une icône d'alerte s'affiche en bas à droite ; cliquer sur l'icône de notification permet d'obtenir la récompense.","475":"Zone de chasse","476":"Sur le terrain de la Garnison de Cell Mahum, l'apparence du 'Voleur d'Élite de Cell Mahum' a été modifiée et son expérience ainsi que son équilibrage ont été renforcés.","477":"Les monstres apparaissant dans le Donjon d'Entraînement – Garnison de Cell Mahum sont désormais identiques aux monstres placés sur le terrain.","478":"Les niveaux indiqués pour les zones de chasse 'Garnison de Cell Mahum' et 'Caverne des Géants' ont été corrigés.","479":"Le problème d'apparition de monstres à des positions anormales dans les zones de chasse concernées a été corrigé.","480":"Zones de chasse concernées : Caverne d'Antharas, Marais du Dragon de Feu, Île des Crocodiles, Citadelle d'Ébène, Garnison de Kru Mahum","481":"Le problème d'affichage de la zone de chasse 'Île Primitive' sur la carte du monde a été corrigé.","482":"Événement - Émargement","483":"Le problème d'apparence d'arme anormale et d'animation inopérante lorsque les classes Spirit et Crow utilisaient le Parchemin de Bénédiction du Dragon, récompense du 8e jour, a été corrigé.","484":"Un 'Coffre de Parchemin de Bénédiction du Dragon' contenant le Coffre de Consommables Hebdomadaire a été ajouté comme récompense d'Émargement du 15e jour.","485":"En plus de l'objet 'Coffre de Consommables Hebdomadaire (à durée limitée)', récompense existante, vous pouvez obtenir aléatoirement 1 objet parmi les 4 Parchemins de Bénédiction du Dragon (à durée limitée) (Dragon du Vent, Dragon de la Terre  jusqu'à la maintenance programmée du 13 mai 2026 (mer) ont été ajoutés.","562":"En utilisant l'objet 'Cristal Raffiné (à durée limitée)', vous pouvez choisir et obtenir 1 objet parmi ceux ci-dessous.","563":"En utilisant l'objet 'Manuel de Fabrication d'Armure (à durée limitée) [Scellé]', vous pouvez obtenir les objets ci-dessous.","564":"Le 'Pack de Manuels de Fabrication d'Armure' n'est plus droppé par les monstres.","565":"Les fabrications de la liste ci-dessous ont été retirées de la Fabrication Spéciale.","566":"Les objets 'Cristal Raffiné (à durée limitée)', 'Manuel de Fabrication d'Armure (à durée limitée) [Scellé]' et 'Pack de Manuels de Fabrication d'Armure (à durée limitée)' feront l'objet d'une suppression groupée lors de la maintenance programmée du 29 juillet 2026 (mer).","567":"Drop de Monstres - Serveur Principal/Eva&Wolf&Valakas/Ilseom&Baldo","568":"Des armures rares sont désormais droppées dans les zones de chasse ci-dessous.","569":"Sur les serveurs Eva&Wolf&Vala/Ilseom&Baldo, les objets ci-dessous sont exclus des récompenses de drop des zones de chasse.","570":"Drop de Raid - Serveur Principal/Eva&Wolf&Valakas/Ilseom&Baldo","571":"Des armures célestes ont été ajoutées aux récompenses de défaite des Raids ci-dessous.","572":"Refonte de la structure des menus - Serveur Principal/Eva&Wolf&Valakas","573":"L'interface du menu système a été refondue.","574":"La mention 'Aide' a été ajoutée au bouton [?] du menu d'aide.","575":"Le bouton [Options], jusqu'ici affiché en double, n'apparaît plus qu'une seule fois dans le menu inférieur.","576":"Le bouton Fabrication Spéciale a été ajouté dans le menu système.","577":"L'emplacement des éléments du menu système a été modifié.","578":"Refonte de la structure des menus - Serveur Ilseom/Baldo","579":"Événement - L'Invitation du Jardinier","580":"L'événement 'L'Invitation du Jardinier' se déroule jusqu'à la maintenance programmée du 20 mai 2026 (mer).","581":"Chaque jour à 11h, l'événement 'Éliminer la Bande de Voleurs du Panier de Fleurs' se déroule.","582":"Chaque jour à 22h, l'événement 'Atelier de Création de Panier de Fleurs' se déroule.","583":"Vous pouvez vous téléporter vers l'Île Fantastique' via la fenêtre pop-up de l'événement.","584":"Après le début de l'événement 'Éliminer la Bande de Voleurs du Panier de Fleurs', 'Pinkbong', 'Bluebong', 'Yellowbong' et 'Darkbong' apparaissent ; le boss et le panier qui apparaissent sont déterminés par le monstre le plus souvent vaincu.","585":"Après le début de l'événement 'Atelier de Création de Panier de Fleurs', vous pouvez voter pour le panier souhaité via le PNJ 'Floria' ; le monstre boss correspondant au panier ayant reçu le plus de votes apparaît.","586":"5 nouveaux objets 'Armure Céleste - Casque/Gantelets/Bottes/Haut/Bas' ont été ajoutés.","587":"L'Armure Céleste - Casque' peut être renforcée avec le 'Parchemin d'Enchantement d'Équipement Légendaire' ; les options par niveau de renforcement sont les suivantes.","592":"Compétence","593":"Les compétences 'Heavy Armor Mastery' et 'Light Armor Mastery', dont l'effet dépendait de l'Armure pour les classes de la lignée Dreadnought, Duelist et Titan, ont été remplacées par la compétence 'Warrior Armor Mastery', dont l'effet s'applique lors de l'équipement d'une armure lourde/légère.","594":"Les compétences 'Warrior Heavy Armor Mastery' et 'Warrior Light Armor Mastery', dont l'effet dépendait de l'Armure pour les classes de la lignée Dreadnought et Duelist, ont été remplacées par la compétence 'Combat Armor Mastery', dont l'effet s'applique lors de l'équipement d'une armure lourde/légère.","595":"Pour les classes de la lignée Maestro et Fortune Seeker, la condition d'Armure de la compétence 'Dwarven Armor Mastery' applique désormais la valeur totale cumulée lors de l'équipement d'une armure légère/lourde.","596":"Pour les classes de la lignée Arcana Lord, Elemental Master et Spectral Master, la condition d'Armure de la compétence 'Summoner Armor Mastery' applique désormais la valeur totale cumulée lors de l'équipement d'une robe/armure légère.","597":"Pour les classes de la lignée Cardinal, Saint d'Eva et Saint de Shilien, la condition d'Armure de la compétence 'Priest Armor Mastery' applique désormais la valeur totale cumulée lors de l'équipement d'une robe/armure légère.","598":"Les compétences 'Robe Mastery', 'Heavy Armor Mastery' et 'Light Armor Mastery', dont l'effet dépendait de l'Armure pour les classes de la lignée Dominator et Doomcryer, ont été remplacées par la compétence 'Defense Mastery', qui n'est pas affectée par la condition d'Armure.","599":"Siège","600":"La présaison du Siège du Château de Giran se déroule.","601":"Lionel Hunter et Herphah sont placés dans la zone d'entrée.","602":"La compétence 'Sceau du Souverain' est octroyée à tous les utilisateurs.","603":"Au début du Siège, les buffs de Lionel Hunter et de Herphah sont octroyés à chaque membre de l'équipe. Tant que ces buffs sont actifs, les buffs et débuffs ne sont pas dissipés en cas de mort.","604":"La porte extérieure permet d'accéder au Gardien de Giran, sur lequel la compétence Sceau du Souverain peut être utilisée.","605":"Lorsque le Sceau est apposé avec succès sur le Gardien de Giran, celui-ci prend la couleur de l'équipe concernée et l'équipe adverse est entièrement renvoyée dans la zone d'entrée.","606":"Repaire Secret de la Mafia","607":"Les horaires du contenu 'Repaire Secret de la Mafia' ont été modifiés.","608":"Amélioration d'interface - Texte des dégâts","609":"La visibilité du texte des dégâts des attaques de compétence a été améliorée.","610":"Entretien de la Guerre de Serveurs","611":"L'équilibrage a été ajusté pour un déroulement plus fluide de la Guerre de Serveurs.","612":"Le déroulement de la Bataille varie désormais selon le classement de la Guerre de Serveurs du cycle précédent.","613":"Des sources d'apport de points de Guerre de Serveurs ont été ajoutées et les scores ajustés.","614":"Un effet visuel a été ajouté au Coffre de Ravitaillement de l'Envahisseur afin d'identifier l'apparition et l'emplacement des récompenses.","615":"Lorsqu'une Invasion de Monstres commence dans le Mirage Fantastique, le passage reliant l'Oasis du Désert se ferme désormais.","616":"Lorsque l'Invasion de Monstres se termine, la porte de ce passage se rouvre.","617":"Donjon d'Entraînement","618":"Le Baron Overlord provenant de l'intérieur de la Caverne des Géants n'apparaît plus.","619":"Une notification s'affiche désormais lorsqu'un monstre autre qu'un boss droppe certains objets.","620":"Le problème d'indication erronée des effets dans l'interface de tatouage lors de l'équipement des 'Teintures Scellées de Force/Constitution/Dextérité/Intelligence/Esprit/Sagacité niveaux 26~30' exclusives à Eva&Wolf&Valakas a été corrigé.","621":"Le problème d'absence occasionnelle d'obtention des récompenses de coup porté & de dernier coup sur Luciano dans le Repaire Secret de la Mafia a été corrigé.","622":"Les compétences 'Construction de Camp' et 'Sceau du Souverain' octroyées au chef de clan selon le niveau du Clan ne sont plus octroyées.","623":"L'absence de mention de la possibilité d'utilisation avec les 'Armes Dragon' dans la description de l'objet Orbe d'Immortalité Raffiné a été corrigée.","624":"Pour plus de confort de jeu, les boutons superflus de la barre latérale ont été supprimés, l'ordre des positions a été ajusté selon les préférences et de nouveaux boutons ont été ajoutés.","625":"[Correction] [Serveur Principal] Avis de Mise à Jour du 6 mai (mer)","626":"En utilisant l'objet 'Parchemin d'Aide à la Progression (à durée limitée) [Scellé]', vous bénéficiez des effets de buff suivants.","627":"Les objets et compétences de buff obtenus dans la Boutique L2 feront l'objet d'une suppression groupée lors de la maintenance programmée du 4 juin 2026 (jeu).","628":"De nouvelles zones de chasse ont été ajoutées.","629":"Les zones de chasse de moins de niveau 90, à l'exception de l'intérieur de la Beehive et du 5e étage de la Tour de l'Insolence, ont été supprimées.","630":"Le boss apparaissant dans le Donjon d'Entraînement a été uniformisé en 'Minor, Épéiste de l'Épreuve'.","631":"Les informations des missions existantes ont été corrigées.","632":"[Serveur Principal] Avis de Mise à Jour du 13 mai (mer)","633":"Fabrication Spéciale – Serveur Eva/Ilseom&Baldo","634":"3 produits fabricables au coût de divers objets jusqu'à la maintenance programmée du 27 mai 2026 ont été ajoutés.","635":"En utilisant l'objet 'Coffre de Bon de Sélection de Poupée Prestige Supérieure~Rare (à durée limitée) [Scellé]', vous pouvez obtenir aléatoirement 1 objet parmi la liste suivante.","636":"En utilisant Bon de Sélection de Poupée Prestige Supérieure~Légendaire (à durée limitée) [Scellé], vous pouvez choisir et échanger les objets de la liste suivante.","637":"Guerre de Serveurs - Serveur Ilseom&Baldo","638":"La Guerre de Serveurs a été ajoutée sur le serveur Ilseom/Baldo.","639":"Les missions liées à la Guerre de Serveurs ont été corrigées et complétées.","640":"Les points de Guerre de Serveurs peuvent être obtenus individuellement via les récompenses de classement de la Bataille pour la Citadelle d'Ébène, les récompenses d'achèvement des missions de la Citadelle d'Ébène, les missions et récompenses de dernier coup de l'Invasion de la Légion des Ténèbres, les récompenses de dernier coup sur le Fantôme du Champ de Bataille, les récompenses de dernier coup sur Luciano et la récompense de 1re place de la Forêt du Duel.","641":"Donjon d'instance d'alliance – Temple du Culte","642":"Le donjon d'instance d'alliance – Temple du Culte a été ajouté.","643":"Vous pouvez entrer dans le 'Temple du Culte' via le PNJ gardien de donjon 'Erdo' au village du Château d'Aden.","644":"Il n'y a aucune pénalité d'expérience en cas de mort du personnage durant le donjon.","645":"À l'entrée dans la zone d'instance, vous êtes déplacé vers la salle d'attente.","646":"Les monstres apparaissant sont les suivants.","647":"La défaite des monstres de la Garde Rapprochée d'Andreas dans chaque salle de la salle d'attente ouvre aléatoirement la porte menant à la chapelle.","648":"Événement Guerre de Serveurs","649":"Un effet de réduction de la consommation de Cristaux Magiques s'applique aux buffs octroyés dans la Citadelle d'Ébène / la Bataille pour la Citadelle d'Ébène.","650":"Lorsque les compétences 'Blessing of Legion' et 'Curse of Legion' sont actives, l'effet identique du Parchemin de Mafr disparaît.","651":"Lorsque les compétences 'Blessing of Legion' et 'Curse of Legion' sont actives, le Parchemin de Mafr ne peut pas être utilisé.","652":"Après la fin de l'événement du 10 juin, les effets de buff seront reconfigurés pour s'adapter à l'environnement des zones de chasse, ou convertis en buffs permanents.","653":"Raid et zones de chasse","654":"Les capacités défensives des boss Raid des Ruines Antiques ont été renforcées.","655":"Sur les serveurs Ilseom/Baldo et Eva, l'équilibrage des monstres de la Forêt du Duel, du Port de Giran, de la bataille de forteresse d'Amad et du Repaire Secret de la Mafia a été renforcé.","656":"Sur le serveur Ilseom&Baldo, la zone de chasse monde à durée limitée 'Tour d'Elmoaden' est terminée.","657":"L'Adena droppée par les monstres apparaissant dans la Citadelle d'Ébène a été réduite.","658":"L'icône de la compétence s'affiche désormais dans la fenêtre de cible des PNJ possédant une compétence de résistance aux dégâts de zone.","659":"Le problème de réglage incorrect de la position de téléportation de la zone de chasse du Cimetière National a été corrigé.","660":"Le problème d'absence de consommation de flèches lors d'une attaque à l'arc a été corrigé.","661":"Le problème d'achèvement occasionnellement impossible de la mission 'Participation au Siège de Giran' malgré une conversation avec le PNJ Lionel Hunter ou Herphah après la participation au Siège de Giran a été corrigé.","662":"Le problème d'invisibilité de l'effet de dragon, selon le terrain ou l'angle de caméra, lors de l'utilisation de la compétence 'Dragon Strike' a été corrigé.","663":"Le problème permettant à un personnage déplacé de force vers le Labyrinthe Souterrain par la pénalité PK d'en sortir via la téléportation libre a été corrigé.","664":"[Serveur Principal] Avis de Mise à Jour du 20 mai (mer)","665":"Boutique L2 - Eva&Wolf&Valakas/Ilseom&Baldo","666":"2 produits achetables jusqu'à la maintenance programmée du 4 juin 2026 (jeu) ont été ajoutés.","667":"En utilisant l'objet 'Pack Agathion Premium (à durée limitée) [Scellé]', vous pouvez obtenir les objets de la liste suivante.","668":"En utilisant l'objet '+8~+9 Coffre d'Agathion Élémentaire (à durée limitée)', vous pouvez obtenir, selon les probabilités, les objets de la liste suivante.","669":"En utilisant l'objet 'Pack de Grimoires Premium (à durée limitée) [Scellé]', vous pouvez obtenir les objets de la liste suivante.","670":"En utilisant l'objet 'Bon d'Échange de Pierre de Recharge d'Enchantement de Compétence (à durée limitée) [Scellé]', vous pouvez choisir et obtenir 1 objet parmi ceux ci-dessous.","671":"Les objets à durée limitée obtenus dans la Boutique L2 feront l'objet d'une suppression groupée lors de la maintenance programmée du 10 juin 2026 (mer).","672":"Eva&Wolf&Valakas","673":"Objet échangeable","674":"Essence du Jardin de la Genèse","675":"Frais en Adena","676":"Parchemin d'Enchantement d'Arme Béni (à durée limitée) [Scellé] 1 unité","677":"430 unités","678":"1,840,000","679":"Ilseom&Baldo","680":"Un produit de Fabrication Spéciale, fabricable au coût de l'objet d'événement 'Essence du Jardin de la Genèse (à durée limitée) [Scellé]' jusqu'au 10 juin 2026 (mer), a été ajouté.","681":"Un produit de fabrication limité au serveur, fabricable au coût de l'objet d'événement 'Essence du Jardin de la Genèse (à durée limitée) [Scellé]' et d'Adena jusqu'au 10 juin 2026 (mer), a été ajouté.","682":"Événement - Reviens au Port de Giran (Serveur Eva&Wolf&Valakas/Ilseom&Baldo)","683":"2 nouveaux produits événementiels ont été ajoutés à la Boutique L2.","684":"En utilisant l'objet 'Pack Cadeau du Héros de Giran (à durée limitée) [Scellé]', vous obtenez de façon garantie les objets de la liste suivante.","685":"En utilisant l'objet 'Parchemin de Giran (à durée limitée) [Scellé]', vous bénéficiez des effets suivants.","686":"L'objet 'Pack de 1000 Bons de Sélection de Gemme (à durée limitée) [Scellé]' n'est utilisable que par les personnages de niveau 88 ou plus.","687":"Les objets à durée limitée et les compétences de buff obtenus dans la Boutique L2 feront l'objet d'une suppression groupée lors de la maintenance programmée du 17 juin 2026 (mer).","688":"Événement - Changement de Classe (Eva&Wolf&Valakas/Ilseom&Baldo)","689":"De nouveaux produits liés au changement de Classe, achetables jusqu'à la maintenance programmée du 10 juin 2026, ont été ajoutés à la Boutique L2.","690":"L'événement Émargement se déroule jusqu'à la maintenance programmée du 17 juin 2026 (mer).","691":"Les objets à durée limitée et les compétences de buff obtenus via l'Émargement feront l'objet d'une suppression groupée lors de la maintenance programmée du 17 juin 2026 (mer).","692":"Événement - Jardin de la Genèse","693":"L'événement 'Jardin de la Genèse' se déroule jusqu'à la maintenance programmée du 10 juin 2026 (mer).","694":"Vous pouvez entrer dans le donjon événementiel 'Jardin de la Genèse' via le PNJ événementiel 'Sylphe' au village du Château de Giran.","695":"Après l'entrée dans le donjon, en parlant au PNJ 'Arne', l'événement démarre et des monstres apparaissent.","696":"Au démarrage du donjon, puis toutes les 30 à 90 secondes après une élimination, l'un des 3 monstres à titre à forte expérience ci-dessous apparaît selon les probabilités.","697":"La défaite d'un monstre à titre annonce à l'avance les informations et l'heure d'apparition du monstre à titre suivant.","698":"La défaite d'un monstre à titre permet d'obtenir l'objet 'Essence du Jardin de la Genèse (à durée limitée) [Scellé]'.","699":"Déco de Nom - Mer d'Été","700":"Déco de Nom - Mer d'Été 1 unité","701":"1 unité","702":"100,000","703":"5 fois par semaine et par serveur","704":"Cristal Magique [Scellé] 10 unités","705":"Effet d'Élimination - Bombe à Eau Rafraîchissante","706":"Effet d'Élimination - Bombe à Eau Rafraîchissante 1 unité","707":"Apparence d'Armure - Maillot de Bain Séduisant","708":"10,000","709":"Les objets à durée limitée obtenus lors de l'événement 'Jardin de la Genèse' feront l'objet d'une suppression groupée lors de la maintenance programmée du 10 juin 2026 (mer).","710":"Mise à Jour de Classe - Trickster","711":"De nouvelles compétences d'attaque ont été ajoutées.","712":"'Trickal Shot' et 'Trickal Dart' deviennent respectivement 'Trickal Shot - Transcendance' et 'Trickal Dart – Transcendance' dans le Donjon de Transcendance.","713":"'Trickal Arrest' est une compétence issue de la modification de l'ancienne 'Chain Arrest'.","714":"Les effets de 'Trickal Method' sont les suivants.","715":"Les effets de 'Fissure d'Âme' sont les suivants.","716":"De nouvelles compétences de buff ont été ajoutées.","717":"Événement - Réduction des frais d'extraction de compétence d'enchantement","718":"Jusqu'à la maintenance programmée du 10 juin 2026, un événement de réduction de 50% des frais d'extraction de compétence d'enchantement et d'utilisation de bon garanti se déroule.","719":"Événement - Coupon Noir","720":"Un Coupon Noir est octroyé au 1er jour de l'Émargement.","721":"En utilisant l'objet 'Coupon Noir - Équipement Spécial (à durée limitée) [Scellé]', vous pouvez restaurer un objet dont le renforcement a échoué sous forme d'objet 'Scellé', ou l'échanger contre une 'Pierre de Renforcement Avancée (à durée limitée) [Scellé]' ou un 'Coffre d'Équipement Spécial +5 (à durée limitée) [Scellé]'.","722":"Les Cristaux de Transcendance obtenus par restauration via le Coupon Noir peuvent servir de matériau lors des tentatives de transcendance de chaque objet. La probabilité de réussi ection] [Serveur Principal] Avis de Mise à Jour du 27 mai (mer)","739":"Objet -Gemme","740":"Correction des effets par niveau de Rubis/Opale","741":"Bonjour, cher client de Lineage II.","742":"Nous remercions chaleureusement nos clients qui aiment Lineage II,","743":"et vous présentons ci-dessous les éléments de la mise à jour du 27 mai (mer).","744":"Objet - Gemme","745":"Le niveau maximal des 6 Gemmes existantes est passé de Lv8 à Lv10.","746":"Les nouvelles Gemmes peuvent être obtenues par fusion de Gemmes Émeraude/Rubis/Saphir/Aigue-marine/Ambre/Opale Lv8 et Lv9.","747":"Les effets des nouvelles Gemmes par niveau sont les suivants.","751":"Zone de chasse spéciale","752":"La nouvelle zone de chasse 'Ruines de Tempest' a été ajoutée aux 'Ruines Antiques'.","753":"En entrant dans les 'Ruines Antiques', vous accédez à une salle d'attente configurée en zone PVE.","754":"Il existe 4 entrées, permettant d'accéder respectivement aux zones de chasse 'Caverne d'Antharas', 'Château du Seigneur de Glace', 'Fournaise de Vulcan' et 'Ruines de Tempest'.","755":"Vous pouvez rejoindre l'intérieur de la zone de chasse via le PNJ de déplacement placé à chaque entrée, ou en vous rendant à l'entrée.","756":"À 20h, la tenue ou non d'un Raid de boss est déterminée pour chaque zone de chasse ; l'entrée des zones de chasse où un Raid de boss est prévu affiche un effet particulier.","757":"Chaque lundi, mardi, mercredi et jeudi à 22h, un boss apparaît selon les probabilités et disparaît le lendemain à 0h.","758":"Les missions 'Exploration de la Caverne d'Antharas' et 'Exploration du Château du Seigneur de Glace' réalisées aux 'Ruines Antiques' ont été supprimées.","759":"De nouvelles missions réalisables aux 'Ruines Antiques' ont été ajoutées.","760":"Classe - Trickster","761":"Les effets de 'Shine/Shadow Transform Lv2', buff déclenché par 'Shine/Shadow Mastery Lv2', ont été ajustés.","762":"De plus, les armes de combat invoquées en état 'Shine/Shadow Transform' conservent désormais leur   const e = esc(s);
  if(!q) return e;
  const rx = new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");

function chips(el, labels, keys, cls, set){
  el.innerHTML = "";
  keys.forEach((k,i)=>{
    const b=document.createElement("button");
    b.type="button"; b.className="chip"+(cls?" "+cls:"");
    b.textContent=labels[i]; b.dataset.k=k;
    b.setAttribute("aria-pressed", set.has(k) ? "true":"false");
    b.onclick=()=>{ set.has(k)?set.delete(k):set.add(k);
      b.setAttribute("aria-pressed", set.has(k)); render(); };
    el.appendChild(b);
  });
}

    const hit = s => !ql || T(s.h).toLowerCase().includes(ql)
                        || s.b.some(id=>T(id).toLowerCase().includes(ql));
    if(ql){ tsec = tsec.filter(hit); csec = csec.filter(hit); }
    if(state.servers.size && !tsec.length) return;
    if(!tsec.length && !csec.length) return;

    nEntries++; nItems += [...tsec,...csec].reduce((n,s)=>n+s.n,0);

    const badges = (a.fix?`<span class="badge b-fix">${esc(u.badgeFix)}</span>`:"")
                 + (a.pre?`<span class="badge b-pre">${esc(u.badgePre)}</span>`:"");

    const secHtml = (s,isT)=>{
      const wolf = (isT && s.w) ? `<span class="wolf">${esc(u.wolfFlag)}</span>` : "";
      const bl = s.b.map(id=>{
        const ko = (state.showKo && state.lang!=="ko")
          ? `<span class="ko-orig">${esc(KO(id))}</span>` : "";
        return `<li>${hl(T(id),q)}${ko}</li>`;
      }).join("");
      const more = s.n > s.b.length
        ? `<p class="more">${esc(u.more.replace("{n}", s.n - s.b.length))}</p>` : "";
      return `<div class="sec ${isT?"t":"c"}">
        <p class="shead">${hl(T(s.h),q)}${wolf}
          <span class="stag">${esc(isT?u.tagTarget:u.tagCommon)}</span></p>
        <ul>${bl}</ul>${more}</div>`;
    };

    out.push(`<article class="entry ${tsec.length?"has-t":""}">
      <div class="ehead"><span class="date">${a.d}</span>${badges}</div>
      <p class="etitle"><a href="${a.u}" target="_blank" rel="noopener">${esc(T(a.t))} →</a></p>
      ${tsec.map(s=>secHtml(s,true)).join("")}
      ${csec.map(s=>secHtml(s,false)).join("")}
    </article>`);
  });

  $("#ledger").innerHTML = out.length ? out.join("")
    : `<div class="empty"><b>${esc(u.emptyTitle)}</b>${esc(u.emptyHint)}</div>`;
  $("#count").textContent =
    `${u.cntNotices} ${nEntries}${u.unit} · ${u.cntItems} ${nItems.toLocaleString(state.lang)}${u.unitItems}`;
}

// language bar
LANGS.forEach(l=>{
  const b=document.createElement("button");
  b.type="button"; b.className="lang"; b.dataset.l=l; b.textContent=l.toUpperCase();
  b.onclick=()=>{ state.lang=l; applyLang(); render(); };
  $("#langbar").appendChild(b);
});

$("#q").addEventListener("input", e=>{ state.q=e.target.value; render(); });
$("#onlyT").addEventListener("change", e=>{ state.onlyT=e.target.checked; render(); });
$("#showKo").addEventListener("change", e=>{ state.showKo=e.target.checked; render(); });
$("#reset").addEventListener("click", ()=>{
  state.q=""; state.servers.clear(); state.months.clear(); state.onlyT=false; state.showKo=false;
  $("#q").value=""; $("#onlyT").checked=false; $("#showKo").checked=false;
  applyLang(); render();
});

try{
  const saved = localStorage.getItem("pacoca-lang");
  if(saved && LANGS.includes(saved)) state.lang = saved;
  else { const n=(navigator.language||"ko").slice(0,2); if(LANGS.includes(n)) state.lang=n; }
}catch(e){}
applyLang(); render();
</script>
</body>
</html>
