.wrap{max-width:1180px;margin:0 auto;padding:0 24px 96px}

.topbar{display:flex;justify-content:flex-end;gap:4px;padding:18px 0 0}

header.mast{padding:26px 0 28px;border-bottom:1px solid var(--rule)}

.mt .rune,.mt h2{color:var(--ink-3)}

@media(max-width:860px){.cols{grid-template-columns:1fr;gap:28px}}

@media(max-width:860px){.rail{position:static}}

습니다.","776":"‘신년 염료 강화제 교환권(기간제) [각인]’ 아이템을 사용 시 아래의 아이템 중 1개를 선택하여 교환할 수 있습니다.","777":"‘신년 복주머니(기간제) [각인]’ 아이템을 사용하여 획득한 (기간제) 아이템은 2026년 3월 4일(수) 정기점검에 일괄 삭제됩니다.","778":"클래스 변경권은 릴레이 상품으로 구성되어 1/2회차 구매 비용이 다르게 설정되어 있습니다.","779":"L2 스토어에서 획득한 기간제 아이템은 2026년 4월 1일(수) 정기점검에 일괄 삭제됩니다.","780":"‘본 서버’에서 2026년 3월 18일(수) 정기점검까지 다양한 비용으로 제작할 수 있는 클래스 변경 상품 3종을 추가하였습니다.","781":"‘전설 마법서 교환권’ 상품은 월드 서버에서 제작할 수 없습니다.","782":"‘정제된 불멸의 보주’ 상품은 월드 서버에서만 제작할 수 있습니다.","783":"‘지옥의 낙뢰’는 공격 시 확률적으로 발동해 보호막과 CP를 무시한 고정 대미지가 적용되며, 재발동 대기 시간 300초를 가지고 있습니다.","784":"‘헬바운드 탈리스만 - 초월’과 하위 탈리스만을 동시에 착용했을 때 가장 높은 단계 효과만 적용됩니다.","785":"마법의 룬 Lv19, 20을 보유한 상태에서 몬스터를 공격 시 확률에 따라 발동 스킬이 사용됩니다.","786":"‘천상의 갑옷 - 투구’의 특수 효과는 아래와 같습니다.","787":"‘천상의 갑옷 - 투구’의 제련 옵션은 다음과 같습니다.","788":"‘천상의 갑옷 - 투구’의 축복 옵션은 다음과 같습니다.","789":"‘천상의 갑옷 - 건틀렛’은 ‘전설 장비 강화 주문서’로 강화할 수 있으며, 강화 단계별 옵션은 아래와 같습니다.","790":"특수 제작에서 획득한 기간제 아이템은 2026년 6월 4일 정기점검에 일괄 삭제됩니다.","791":"2026년 6월 17일(수) 정기점검까지 ‘플레이 & 복귀 감사 티켓(기간제) [각인’ 아이템을 비용으로 제작할 수 있는 상품 7종을 추가하였습니다.","792":"‘클래스 변경권(기간제) [각인]’ 아이템은 릴레이 상품으로 순차적으로 구매가 가능합니다","793":"‘변경권 8종 아이템은 2026년 6월 17일(수) 정기점검에 일괄 삭제됩니다.","794":"‘에바&울프&발라카스/일섬&발도 서버’에서 2026년 6월 10일 정기점검까지 제작할 수 있는 제작 상품 1종을 추가하였습니다.","795":"‘에바/일섬&발도 월드 서버’에서만 2026년 6월 10일 정기점검까지 제작할 수 있는 제작 상품 1종을 추가하였습니다.","796":"앰버의 사용 스킬에서 ‘스킬 시전 방해’ 효과를 삭제하였습니다."},"en":{"1":"[Correction] [Main Server] February 11 (Wed) Update Notice","2":"Unique Shop - Eva&Wolf&Valakas/Ilseom&Baldo Server","3":"The new content 'Unique Shop' is available until the scheduled maintenance on February 25, 2026 (Wed).","4":"When the 'Unique Shop' UI on the right sidebar opens, you can participate with 1 use or 11 uses.","5":"Selecting 11 uses gives a discount compared to 1 use.","6":"The usage fees are as follows.","7":"Rewards are divided into Grade B, Grade A, and Grade S; B is the lowest grade and S is the highest grade.","8":"The Unique Shop provides an opportunity to guaranteed obtain only Grade A or higher items at every 100 cumulative uses.","9":"Eva/Wolf/Valakas/Crow","10":"Boss Monster","11":"Drop Rate","12":"Drop Item","13":"Centaur Warlord","14":"1 of 3 types dropped","15":"Aden's Soul Collection Stone Lv1 - Weapon x1","16":"Event Special Craft - Eva&Wolf&Valakas/Ilseom&Baldo Server","17":"Added 2 products that can be crafted until the scheduled maintenance on February 25, 2026 (Wed).","18":"Added 6 products that can be crafted until the scheduled maintenance on March 4, 2026 (Wed).","19":"(Time-limited) items obtained through Special Craft will be deleted in bulk at the scheduled maintenance on March 4, 2026 (Wed).","20":"The New Year Coin (Time-limited) item will be deleted in bulk at the scheduled maintenance on March 11, 2026 (Wed).","21":"Using the '+7~+8 Boss Weapon Exchange Coupon Box (Time-limited) [Sealed]' item, you can obtain 1 of the following items by chance.","22":"Using the '+7~+8 Special Armor Exchange Coupon Box (Time-limited) [Sealed]' item, you can obtain 1 of the following items by chance.","23":"L2 Store","24":"Added 1 product available for purchase until the scheduled maintenance on February 25, 2026 (Wed).","25":"Using the 'New Year Lucky Pouch (Time-limited) [Sealed]', you can obtain 1 of the items below by chance.","26":"When using the 'New Year Equipment Exchange Coupon (Time-limited) [Sealed]' item, you can select and exchange for 1 of the items below.","28":"Special Craft","29":"Added 6 limited craft products that can be crafted using 'Giran Seal' as the cost, until the scheduled maintenance on February 25, 2026 (Wed).","30":"Added 6 craft products that can be crafted using 'Giran Seal' as the cost, until the scheduled maintenance on February 25, 2026 (Wed).","31":"Added 4 craft products that can be crafted using 'Valakas Doll Summon Coupon' as the cost, until the scheduled maintenance on February 25, 2026 (Wed).","32":"(Time-limited) items obtained from Special Craft will be deleted in bulk at the scheduled maintenance on March 4, 2026 (Wed).","33":"Using the 'Top-grade~Legendary Valakas Doll Summon Coupon Box (Time-limited) [Sealed]', you can obtain 1 of the items below by chance.","34":"The obtained (Time-limited) items will be deleted in bulk at the scheduled maintenance on March 4, 2026 (Wed).","35":"Growth Support Event","36":"Added buff scrolls available for purchase until the scheduled maintenance on March 4, 2026 (Wed).","37":"Using the Growth Support Scroll (Time-limited) [Sealed] applies the effects below.","38":"The 'Growth Support Scroll (Time-limited) [Sealed]' and 'Transformation Scroll (Time-limited) [Sealed]' items and their buffs will be deleted in bulk at the scheduled maintenance on March 4, 2026 (Wed).","39":"Event - Levenhart's Proving Ground","40":"The 'Levenhart's Proving Ground' Event runs until the scheduled maintenance on March 4, 2026 (Wed).","41":"You can enter the event instance zone 'Levenhart's Proving Ground' through the special hunting ground UI on the right sidebar.","42":"After entering, talking to NPC 'Levenhart' starts a 10-minute countdown, binds the event dungeon, and begins the ranking EXP tally.","43":"When the event starts, ' Kamen Order Member' monsters and, at regular intervals, Stage 1 evolution monsters spawn.","44":"When Stage 1~5 evolution monsters are defeated, they can evolve into a higher-stage monster at a set probability.","45":"Defeating Kamen gives a chance to obtain rewards.","46":"Event - Byeongo Year, Blessing of the Red Horse","47":"The 'Year of the Red Horse' New Year Event runs until the scheduled maintenance on March 4, 2026 (Wed).","48":"You can enter the event dungeon 'Meadow of Souls' through the event NPC 'Redin' in Crow Village.","49":"After entering the dungeon, talking to NPC 'Connie' makes monsters and horses appear; when horses appear 10 times, the boss monster 'Centaur Warlord' appears.","50":"One of three horses spawns every 1 minute, and when the 'Red Swift Horse' spawns, the 'Storm Wolf' monster appears.","51":"When a horse arrives at a certain point, an EX y Flower Bud Imbued with Spring Energy' Event runs until the scheduled maintenance on March 25, 2026 (Wed).","157":"You can enter the event dungeon 'Spring Garden' through the event NPC 'Flora' in Giran Castle Town.","158":"After entering the dungeon, talking to NPC 'Arin' makes monsters and flower buds appear.","159":"A party bonus is applied when defeating monsters.","160":"You can talk to a total of 10 flower buds, and 20 seconds after one conversation, you can talk to the next flower bud.","161":"When talking to a flower bud that is blooming, honeybees and great hornets are summoned by chance.","162":"Fixed 'Kain van Halter' so that he uses the dash Skill smoothly.","163":"Reduced the damage of the dash Skill.","164":"Clan Donation","165":"The daily maximum number of Clan Donations has changed.","166":"As the maximum donation count has changed, the Clan EXP gained from High-grade and Top-grade donations has changed.","167":"Fixed an issue where the world map was displayed abnormally when entering the special hunting ground 'Ancient Ruins - Antharas' Cave'.","168":"The 'Swordheart of Gale' Skill described an effect that does not actually work, so that description was removed.","169":"The 'Night Parade of a Hundred Demons' Skill did not state its number of attacks, so that information was added.","170":"Fixed an issue where the 'Avalanche - Carnage Play' Skill did not state its consumable item (Magic Crystal).","171":"The Infinite Quiver (No-grade~A-grade) and Elemental Orb (No-grade~A-grade) are consolidated into the single items Infinite Quiver and Elemental Orb respectively.","172":"The Infinite Quiver and Elemental Orb items of each grade that were granted during character growth are granted once as the consolidated item at the point they are first needed.","173":"[Correction] [Main Server] March 11 (Wed) Update Notice","174":"Special Craft - Ilseom&Baldo Server","175":"Added products that can be crafted using 'Adena' as the cost until the scheduled maintenance on March 25, 2026 (Wed).","176":"Ilseom/Baldo Server","177":"Craft Cost (Enchant +1)","178":"Craft Cost (Enchant +2)","179":"Craft Cost (Enchant +3)","180":"You can use the 'Pitch-Black Coin Pouch [Sealed]' item that was granted from the 'Invasion of the Dark Legion Mission.","181":"When using the 'Pitch-Black Coin Pouch [Sealed]' item, you can obtain 1 of the items below by chance.","182":"Event - Class Change","183":"Added new Class change-related products to the L2 Store, available for purchase until the scheduled maintenance on April 1, 2026 (Wed).","184":"Dragon Weapon - Special Craft","185":"Weapon types have been added to the 'Dragon Box' from which a 'Dragon Weapon' can be obtained.","186":"The added weapon types are 7: Greatsword/Spear/Axe/Magic Blunt Weapon/Dual Swords/Gun/Rapier.","187":"You can exchange for a box of each weapon type through an exchange coupon.","188":"7 Dragon Weapons were added to the 'Refined Orb of Immortality' item exchange list.","189":"The additional items obtainable from the Dragon Weapon Box Exchange Coupon are as follows.","190":"Added 14 'Dragon Weapon Appearance Change' products that can be crafted using various items as the cost.","191":"End of World and Server Sieges","192":"Siege-related content on the Main Server has been deleted.","193":"The Giran Castle taxes accumulated before the scheduled maintenance and the Adena stored in the castle vault were granted to the Clan Leader.","194":"Server War","195":"Added a Server War in which up to 4 servers participate.","196":"Server War content and rankings are shared between matched servers, and the matched server groups are as follows.","197":"The Server War runs for one week, from 06:30 every Wednesday until 00:00 the following Wednesday.","198":"From 00:00 to 06:30 on Wednesday is the ranking tally period, and Server War points obtained during that time are not reflected in the rankings.","199":"When a new cycle begins, each server in the matched server group is assigned a legion id, which is maintained for that cycle.","200":"Server and individual rankings are determined based on the Server War points obtained over the week.","201":"Legion Cloak","202":"The existing 'Aden Cloak [Sealed]' item was changed to the 'Legion Cloak [Sealed]'.","203":"'Aden Cloak [Sealed]' items already owned were replaced with the 'Legion Cloak'.","204":"When the 'Legion Cloak [Sealed]' item is equipped, the effects below apply according to its enchant level.","205":"For the Crow and Assassin Classes and High Elves, the 'Legion Cloak'-exclusive appearance is not applied when the 'Legion Cloak' item is equipped.","206":"The 'Legion Cloak' can be enchanted through the 'Legion Cloak Enchant Scroll'.","207":"'Aden Cloak Enchant Scroll' items already owned were replaced with the 'Legion Cloak Enchant Scroll'.","208":"Doll","209":"Added new Dolls.","210":"The 'Dark Legion Commander Kain' Doll cannot be obtained through synthesis.","211":"Added a new Doll collection.","212":"Changed the [Pitch-Black Terror] Skill effect used by minion mobs from fleeing in the opposite direction to moving in a random direction.","213":"Fixed an issue where EXP was sometimes reduced upon dying in the Pitch-Black Citadel.","214":"Doombringer","215":"Added new combat abilities to the Doombringer Class.","216":"Improved the 'Shine/Shadow Soul Finding' Skill.","217":"Changed the Skill name 'Shine/Shadow Soul Finding' to 'Shine/Shadow Soul Affinity'.","218":"Changed 'Shine/Shadow Soul Affinity' into a buff Skill, resolving DPS loss.","219":"Changed in common for the 'Doombringer' and 'Soul Hound' Classes.","220":"Improved the 'Shine/Shadow Side' Skill.","221":"Transformation method changed","222":"[Overwhelming Force] triggers on Skill use","223":"→ [Overwhelming Force] triggers with a 2% chance on attack","224":"Overwhelming Force","225":"Added a new [Legendary] grade Skill.","226":"Learning the Skill consumes [Spellbook - Overwhelming Power: Master].","227":"Overwhelming Force: Master", acts window were removed, and whisper/mail tabs were added within the friends list.","256":"One-on-one chat can be started by double-clicking a friend's name in the friends list.","257":"Backgrounds/icons/buttons and the like were improved for easier recognition.","258":"Added the 'Forest of Wind Time Charging Stone [Sealed]' item to the sales lists of the general merchant and the special merchant.","259":"Fixed an issue where the character moved when the auto potion use icon was clicked.","260":"Fixed an issue in the obtained items section of the Play Report where the quantity of stackable items did not match the quantity shown in the tooltip on mouse-over.","261":"Fixed an issue where Adena was sometimes reduced when returning from the World Server to the original server.","262":"Fixed an issue where the extraction UI was displayed when changing Class even if there were no Skills to extract.","263":"Fixed an issue where the Luciano last-hit reward was sometimes not granted in the Mafia's Secret Hideout.","264":"[Correction] [Main Server] March 18 (Wed) Update Notice","265":"Eva/Wolf/Valakas","266":"Target Hunting Ground","267":"Aden Royal Cemetery","268":"Swamp of the Fire Dragon","269":"Mirage of Illusion","270":"Sel Mahum Camp_Enhanced","271":"Kruma Mahum Camp","272":"Ilseom/Baldo","273":"Until the scheduled maintenance on March 25, 2026 (Wed), defeating specific monsters that appear in the hunting grounds below gives a chance to obtain the 'Mystery Surprise Box (Time-limited)' item.","274":"Eva/Wolf/Valakas/Ilseom/Baldo","275":"The 'Mystery Surprise Box (Time-limited)' and 'Mystery Ticket (Time-limited) [Sealed]' items obtained from the Event will be deleted at the scheduled maintenance on April 1, 2026 (Wed).","276":"Sairax Temple - Ilseom/Baldo Server","277":"On Ilseom/Baldo Server, the 'Sairax Temple' world matching dungeon runs daily at 22:30.","278":"'Sairax Temple' can be entered at the entry time through the notification HUD or special hunting ground → World.","279":"After entering, the content starts when 5 players gather through random matching in the waiting area.","280":"If there are not enough players even after the entry time expires, you can talk to 'Mignon' to choose to proceed with the content or to leave.","281":"Forming a party with the matched players gives a party bonus.","282":"After the dungeon starts, some of the sealed NPCs are unsealed every 2 minutes and become attackable.","283":"Event - Mystery Surprise Box","284":"The 'Mystery Surprise Box' Event runs until the scheduled maintenance on March 25, 2026 (Wed).","285":"The 'Mystery Box' Raid Event runs daily at 22:00.","286":"You can teleport to the 'Island of Illusion' through the Event UI popup.","287":"After the Raid Event starts, the 'Mystery Box' spawns, and those who strike and defeat the 'Mystery Box' can obtain the rewards below.","288":"The obtained 'Mystery Surprise Box (Time-limited)' item can be used after the scheduled maintenance on March 25, 2026 (Wed).","289":"Added 1 Mission that can be performed during the Event period.","290":"The supply of Server War points has been partially changed.","291":"Defeating the 'Phantom of the Battlefield' in the Pitch-Black Citadel grants 1 Server War point.","292":"The Server War points granted for completing the Pitch-Black Citadel boss defeat Mission are changed to 40 points.","293":"Added 1 item that can be exchanged using the 'Pitch-Black Coin [Sealed]' obtained in the Pitch-Black Citadel, until the scheduled maintenance on April 22, 2026 (Wed).","294":"The 'Berserker Scroll (Time-limited) [Sealed]' item will be deleted in bulk at the scheduled maintenance on April 22, 2026 (Wed).","295":"Fixed an issue where hostile relations were applied incorrectly in the Pitch-Black Citadel and the Pitch-Black Citadel Capture Battle.","296":"Server War - Pitch-Black Citadel","297":"Changed so that the Royal Guard Mages of other legions cannot be attacked.","298":"Fixed the Four Heavenly Kings and Phantom o ment (Time-limited) [Sealed]' and 'Magic Rune Lv1 (Time-limited) [Sealed]' items will be deleted at the scheduled maintenance on April 15, 2026 (Wed).","383":"You can upgrade the 'Magic Rune (Time-limited) [Sealed]' item into a higher-level 'Magic Rune' item by synthesizing it with the 'Magic Rune Fragment (Time-limited) [Sealed]'.","384":"Holding a Magic Rune grants a buff.","385":"Event - Mystery Box","386":"The 'Mystery Surprise Box (Time-limited)' you own was changed to the 'Mystery Surprise Box Exchange Coupon (Time-limited)'.","387":"Using the 'Mystery Surprise Box Exchange Coupon (Time-limited)', you can exchange it for the 'Mystery Surprise Box (Time-limited) [Sealed]'.","388":"Using the 'Mystery Surprise Box (Time-limited) [Sealed]', you can obtain 1 of the items below depending on the server.","389":"Time-limited items obtained from the Event will be deleted at the scheduled maintenance on April 15, 2026 (Wed).","390":"The Doll Summon Coupon (Hero) - 1 Time (Time-limited) [Sealed] item will be deleted at the scheduled maintenance on April 22, 2026 (Wed).","391":"Clan","392":"Characters (including pets/summons) in the same party or the same alliance as a hostile clan member enter a temporary hostile state.","393":"Temporary hostile relations apply the same as existing hostile relations.","394":"When you form a party/alliance with a hostile clan, the single-sword mark/double-sword mark indicating a hostile clan is displayed.","395":"When you form a party/alliance with a hostile clan, an attack action attempt results in an immediate attack.","396":"Changed the category of the product crafted with the 'Doll Summon Coupon -1 Time' and Adena to <Enhancement/Growth>.","397":"Products in the Special Craft → Event category were split into many small counts, so they were consolidated into positions by content.","398":"Fixed an issue where the radar map zoom in/out function did not work in towns.","399":"Improved the visibility of the weapon/armor damaged icon.","400 passage opens again.","617":"Training Dungeon","618":"Fixed so that the Baron Overlord that comes out inside the Cave of Giants does not appear.","619":"Set it so that a notification is displayed when monsters other than bosses drop specific items.","620":"Fixed an issue where the effects were described incorrectly in the tattoo UI when equipping the Eva&Wolf&Valakas-exclusive 'Sealed Dye of Strength/Constitution/Dexterity/Intelligence/Mentality/Wit Stage 26~30'.","621":"Fixed an issue where the Luciano strike & last-hit rewards were sometimes not obtained in the Mafia's Secret Hideout.","622":"Fixed so that the 'Encampment' and 'Ruler's Seal' Skills granted to Clan Leaders according to clan level are no longer granted.","623":"Fixed the missing notice in the Refined Orb of Immortality item description that it can be used for 'Dragon Weapons'.","624":"For gameplay convenience, unnecessary buttons were removed from the sidebar, positions were sorted by preference, and new buttons were added.","625":"[Correction] [Main Server] May 6 (Wed) Update Notice","626":"Using the 'Growth Support Scroll (Time-limited) [Sealed]' item applies the following buff effects.","627":"Items and buff skills obtained from the L2 Store will be deleted in bulk at the scheduled maintenance on June 4, 2026 (Thu).","628":"Added new hunting grounds.","629":"Deleted the hunting grounds below level 90, except for the inner Beehive and the 5th floor of the Tower of Insolence.","630":"Unified the bosses appearing in the Training Dungeon as the 'Swordsman of Trials Minor'.","631":"Corrected the existing Mission information.","632":"[Main Server] May 13 (Wed) Update Notice","633":"Special Craft – Eva/Ilseom&Baldo Server","634":"Added 3 products that can be crafted using various items as the cost until the scheduled maintenance on May 27, 2026.","635":"Using the 'Top-grade~Rare Prestige Doll Selection Coupon Box (Time-limited) [Sealed]' item, you can obtain 1 of the following items by chance.","636":"Using the Top-grade~Legendary Prestige Doll Selection Coupon (Time-limited) [Sealed], you can select and exchange for the following items.","637":"Server War-Ilseom&Baldo Server","638":"Added the Server War to Ilseom/Baldo Server.","639":"Corrected and added Server War-related Missions.","640":"Server War points can be obtained individually through the Pitch-Black Citadel Capture Battle ranking rewards, Pitch-Black Citadel Mission completion rewards, Invasion of the Dark Legion Mission and last-hit rewards, Phantom of the Battlefield last-hit rewards, Luciano last-hit rewards, and Forest of Duels 1st place rewards.","641":"Alliance Instance Dungeon – Temple of the Cult","642":"Added the Alliance Instance Dungeon – Temple of the Cult.","643":"You can enter the 'Temple of the Cult' through the dungeon manager 'Erdo' NPC in Aden Castle Town.","644":"There is no EXP penalty when a character dies during the dungeon.","645":"On entering the instance zone, you are moved to the waiting room area.","646":"The monsters that appear are as follows.","647":"When the Andreas' Royal Guard monsters in each waiting room are defeated, a door to the chapel opens at random.","648":"Server War Event","649":"A Magic Crystal consumption reduction effect is applied to the buffs provided in the Pitch-Black Citadel / Pitch-Black Citadel Capture Battle.","650":"When the 'Blessing of Legion' or 'Curse of Legion' Skills are applied, the effect of Mapr's Scroll, which has the same effect, disappears.","651":"While the 'Blessing of Legion' or 'Curse of Legion' Skills are applied, Mapr's Scroll cannot be used.","652":"After the Event ends on June 10, the buff effects will be reorganized into a form suited to the hunting ground environment, or converted into permanent buffs.","653":"Raids and Hunting Grounds","654":"Increased the defensive capabilities of the Ancient Ruins raid bosses.","655":"Increased the balance of the monsters in the Forest of Duels, Giran Harbor, Fortress Battle Amad, and Mafia's Secret Hideout on Ilseom/Baldo Server and Eva Server.","656":"The world timed hunting ground 'Tower of Elmoaden' has ended on Ilseom&Baldo Server.","657":"Reduced the Adena dropped by monsters appearing in the Pitch-Black Citadel.","658":"Changed so that the icon of the area damage resistance Skill is displayed in the target window of NPCs that possess it.","659":"Fixed an issue where the teleport position of the National Cemetery hunting ground was set incorrectly.","660":"Fixed an issue where arrows were not consumed when attacking with a bow.","661":"Fixed an issue where the 'Giran Siege Participation' Mission was sometimes not completed even after talking to the NPC Lionel Hunter or Herphah after participating in the Giran Siege.","662":"Fixed an issue where the dragon effect was not visible depending on terrain or camera angle when the 'Dragon Strike' Skill was used.","663":"Fixed an issue where a character forcibly moved to the Underground Labyrinth by a PK penalty could use free teleport to move outside the Underground Labyrinth.","664":"[Main Server] May 20 (Wed) Update Notice","665":"L2 Store - Eva&Wolf&Valakas/Ilseom&Baldo","666":"Added 2 products available for purchase until the scheduled maintenance on June 4, 2026 (Thu).","667":"Using the 'Premium Agathion Package (Time-limited) [Sealed]' item, you can obtain the following items.","668":"Using the '+8~+9 Spirit Agathion Box (Time-limited)' item, you can obtain the following items by chance.","669":"Using the 'Premium Spellbook Package (Time-limited) [Sealed]' item, you can obtain the following items.","670":"When using the 'Skill Enchant Charging Stone Exchange Coupon (Time-limited) [Sealed]' item, you can select and obtain 1 of the items below.","671":"Time-limited items obtained from the L2 Store will be deleted in bulk at the scheduled maintenance on June 10, 2026 (Wed).","672":"Eva&Wolf&Valakas","673":"Exchangeable Item","674":"Energy of the Garden of Genesis","675":"Adena Fee","676":"Blessed Weapon Enchant Scroll (Time-limited) [Sealed] x1","677":"x430","678":"1,840,000","679":"Ilseom&Baldo","680":"Added a Special Craft product that can be crafted using the 'Energy of the Garden of Genesis (Time-limited) [Sealed]' Event item as the cost, until June 10, 2026 (Wed).","681":"Added a server-limited craft product that can be crafted using the 'Energy of the Garden of Genesis (Time-limited) [Sealed]' Event item and Adena as the cost, until June 10, 2026 (Wed).","682":"Event - Come Back to Giran Harbor (Eva&Wolf&Valakas/Ilseom&Baldo Server)","683":"Added 2 new Event products to the L2 Store.","684":"Using the 'Giran Warrior's Gift Pack (Time-limited) [Sealed]' item, you can obtain the following items as guaranteed rewards.","685":"Using the 'Giran Scroll (Time-limited) [Sealed]' item applies the following effects.","686":"The 'Gem Selection Exchange Coupon 1000-piece Pack (Time-limited) [Sealed]' item can only be used by characters level 88 or higher.","687":"Time-limited items and buff skills obtained from the L2 Store will be deleted in bulk at the scheduled maintenance on June 17, 2026 (Wed).","688":"Event - Class Change (Eva&Wolf&Valakas/Ilseom&Baldo)","689":"Added new Class change-related products to the L2 Store, available for purchase until the scheduled maintenance on June 10, 2026.","690":"The Attendance Check Event runs until the scheduled maintenance on June 17, 2026 (Wed).","691":"Time-limited items and buff skills obtained from the Attendance Check will be deleted in bulk at the scheduled maintenance on June 17, 2026 (Wed).","692":"Event - Garden of Genesis","693":"The 'Garden of Genesis' Event runs until the scheduled maintenance on June 10, 2026 (Wed).","694":"You can enter the event dungeon 'Garden of Genesis' through the event NPC 'Sylphie' in Giran Castle Town.","695":"After entering the dungeon, talking to NPC 'Arne' starts the Event and monsters appear.","696":"At the dungeon start and every 30~90 seconds after a defeat, 1 of the 3 high-EXP titled monsters below appears by chance.","697":"When a titled monster is defeated, the information and appearance time of the next titled monster are announced in advance.","698":"Defeating a titled monster gives the 'Energy of the Garden of Genesis (Time-limited) [Sealed]' item.","699":"Name Deco - Summer Sea","700":"Name Deco - Summer Sea x1","701":"x1","702":"100,000","703":"5 times per week per server","704":"Magic Crystal [Sealed] x10","705":"Kill Effect - Cool Water Bomb","706":"Kill Effect - Cool Water Bomb x1","707":"Armor Appearance - Alluring Swimsuit","708":"10,000","709":"Time-limited items obtained from the 'Garden of Genesis' Event will be deleted in bulk at the scheduled maintenance on June 10, 2026 (Wed).","710":"Class Update - Trickster","711":"Added new attack Skills.","712":"'Trickal Shot' and 'Trickal Dart' are enhanced into 'Trickal Shot - Transcendence' and 'Trickal Dart – Transcendence' respectively in the Transcendence Dungeon.","713":"'Trickal Arrest' is a Skill changed from the existing 'Chain Arrest'.","714":"The effects of 'Trickal Method' are as follows.","715":"The effects of 'Soul Rift' are as follows.","716":"Added new buff Skills.","717":"Event - Enchant Skill Extraction Cost Discount","718":"A 50% discount Event on enchant Skill extraction and Guarantee Coupon usage fees runs until the scheduled maintenance on June 10, 2026.","719":"Event - Black Coupon","720":"A Black Coupon is granted on Day 1 of the Attendance Check.","721":"Using the 'Black Coupon - Special Equipment (Time-limited) [Sealed]' item, you can restore an item that failed enchantment into a 'Sealed' item, or exchange it for a 'High-grade Enhancement Stone (Time-limited) [Sealed]' or '+5 Special Equipment Box (Time-limited) [Sealed]' item.","722":"Transcendence Crystal items obtained through Black Coupon restoration can be used as materials when attempting transcendence on each item. The transcendence success rate and synthesis fee are the same as before.","723":"Transcendence Crystal items can be used as follows.","724":"Using the 'Black Coupon - Doll Synthesis (Time-limited) [Sealed]' item, you can restore the highest-grade re-synthesis coupon among your Doll synthesis failure history, or exchange it for the 'Doll Summon Coupon (Common~Hero) - 11 Times (Time-limited) [Sealed]' or 'Top-grade Doll Selection Coupon (Time-limited) [Sealed]' item.","725":"Black Coupon-related time-limited items will be deleted in bulk at the scheduled maintenance on June 17, 2026 (Wed).","726":"Deleted the 'Primeval Garden Exploration', 'Eva's Underwater Garden Exploration', and 'Garden of Power Exploration' Missions performed in the 'Forgotten Garden'.","727":"Added new Missions that can be performed in the 'Forgotten Garden'.","728":"Changed the level at which the 'Path of Steady Training' Mission performed in the Training Dungeon can be done to be the same as the Training Dungeon entry level.","729":"World Exchange","730":"Added a 'Guardian' category to the World Exchange.","731":"Improved so that unsealed Guardian summon items can be registered on the World Exchange.","732":"When a Guardian is registered on the World Exchange, the Guardian's stage/name/level/proficiency/skills are preserved.","733":"The conditions for using Guardian necklaces and contracts on the World Exchange are as follows.","734":"Only Guardians of level 40 or higher can be registered.","735":"They cannot be registered on the World Exchange while equipped or summoned.","736":"Fixed an issue where Andreas van Halter sometimes did not use the aerial bind Skill.","737":"Fixed an issue where the '2,000 SP Scroll (Sealed)' item could not be used.","738":"[Correction] [Main Server] May 27 (Wed) Update Notice","739":"Item -Gem","740":"Ruby/Opal effect corrections by level","741":"Hello, Lineage II customers.","742":"We would like to thank our customers for loving Lineage II,","743":"and we inform you of the May 27 (Wed) update details as follows.","744":"Item - Gem","745":"Expanded the maximum level of the 6 existing Gems from Lv8 to Lv10.","746":"New Gems can be obtained through synthesis of Emerald/Ruby/Sapphire/Aquamarine/Amber/Opal Lv8 and Lv9 Gems.","747":"The effects of the new Gems by level are as follows.","751":"Special Hunting Ground","752":"Added the new hunting ground 'Ruins of Tempest' within the 'Ancient Ruins'.","753":"On entering the 'Ancient Ruins', you enter a waiting room set as a PVE zone.","754":"There are 4 entrances, each allowing entry to the 'Antharas' Cave', 'Castle of the Ice Lord', 'Vulcan's Furnace', and 'Ruins of Tempest' hunting grounds.","755":"You can move to the inner area of a hunting ground through the transport NPC placed at each entrance or by moving to the entrance.","756":"At 20:00, whether each hunting ground has a boss Raid is determined, and the entrance of a hunting ground scheduled for a boss Raid displays a unique effect.","757":"Every Monday, Tuesday, Wednesday, and Thursday at 22:00, a boss appears by chance, and the boss disappears at 00:00 the next day.","758":"Deleted the 'Antharas' Cave Exploration' and 'Castle of the Ice Lord Exploration' Missions performed in the 'Ancient Ruins'.","759":"Added new Missions that can be performed in the 'Ancient Ruins'.","760":"Class - Trickster","761":"Adjusted the effects of 'Shine/Shadow Transform Lv2', the buff triggered by 'Shine/Shadow Mastery Lv2'.","762":"Also, improved it so that combat weapons summoned while in the 'Shine/Shadow Transform' state remain summoned even after a position change due to world movement and the like.","763":"Adjusted the cooldown of the 'Deception' Skill and adjusted the effect of 'Reorganization', the buff it triggers.","764":"Adjusted the effects of 'Carpet Bombing' and 'Design Flaw', the debuffs triggered by 'Legendary Archer/Legendary Archer: Master'.","765":"Class - Sagittarius, Moonlight Sentinel, Ghost Sentinel","766":"Binding Shot → Improved the buff effect and expanded its levels.","767":"Added Attack Power +500 to o divididas em grau B, grau A e grau S, sendo B o grau mais baixo e S o mais alto.","8":"A cada 100 usos acumulados, a Loja Única oferece uma chance de obter garantidamente apenas itens de grau A ou superior.","9":"Eva/Wolf/Valakas/Crow","10":"Monstro Chefe","11":"Chance de Drop","12":"Item de Drop","13":"Centauro Senhor da Guerra","14":"Drop de 1 entre 3 tipos","15":"Pedra de Coleta de Almas de Aden Lv1 - 1 Arma","16":"Fabricação Especial de Evento - Servidor Eva&Wolf&Valakas/Ilseom&Baldo","17":"Adicionamos 2 produtos que podem ser fabricados até a manutenção programada de 25 de fevereiro de 2026 (qua).","18":"Adicionamos 6 produtos que podem ser fabricados até a manutenção programada de 4 de março de 2026 (qua).","19":"Os itens (por tempo limitado) obtidos na Fabricação Especial serão excluídos em massa na manutenção programada de 4 de março de 2026 (qua).","20":"O item Moeda de Ano Novo (por tempo limitado) será excluído em massa na manutenção programada de 11 de março de 2026 (qua).","21":"Ao usar o item '+7~+8 Caixa de Vale de Arma de Chefe (por tempo limitado) [Selado]', é possível obter aleatoriamente 1 dos itens da lista a seguir.","22":"Ao usar o item '+7~+8 Caixa de Vale de Armadura Especial (por tempo limitado) [Selado]', é possível obter aleatoriamente 1 dos itens da lista a seguir.","23":"Loja L2","24":"Adicionamos 1 produto disponível para compra até a manutenção programada de 25 de fevereiro de 2026 (qua).","25":"Ao usar 'Bolsa da Sorte de Ano Novo (por tempo limitado) [Selado]', é possível obter 1 dos itens abaixo conforme a probabilidade.","26":"Ao usar o item 'Vale de Equipamento de Ano Novo (por tempo limitado) [Selado]', é possível escolher e trocar por 1 dos itens abaixo.","28":"Fabricação Especial","29":"Adicionamos 6 produtos de fabricação limitada que podem ser fabricados com o custo de 'Selo de Giran' até a manutenção programada de 25 de fevereiro de 2026 (qua).","30":"Adicionamos 6 produtos de fabricação que podem ser fabricados com o custo de 'Selo de Giran' até a manutenção programada de 25 de fevereiro de 2026 (qua).","31":"Adicionamos 4 produtos de fabricação que podem ser fabricados com o custo de 'Vale de Invocação de Boneco Valakas' até a manutenção programada de 25 de fevereiro de 2026 (qua).","32":"Os itens (por tempo limitado) obtidos na Fabricação Especial serão excluídos em massa na manutenção programada de 4 de março de 2026 (qua).","33":"Ao usar 'Caixa de Vale de Invocação de Boneco Valakas Supremo~Lendário (por tempo limitado) [Selado]', é possível obter 1 dos itens abaixo conforme a probabilidade.","34":"Os itens (por tempo limitado) obtidos serão excluídos em massa na manutenção programada de 4 de março de 2026 (qua).","35":"Evento de Apoio ao Crescimento","36":"Adicionamos pergaminhos de bênção disponíveis para compra até a manutenção programada de 4 de março de 2026 (qua).","37":"Ao usar Pergaminho de Apoio ao Crescimento (por tempo limitado) [Selado], os seguintes efeitos são aplicados.","38":"Os itens 'Pergaminho de Apoio ao Crescimento (por tempo limitado) [Selado]' e 'Pergaminho de Transformação (por tempo limitado) [Selado]' e seus buffs serão excluídos em massa na manutenção programada de 4 de março de 2026 (qua).","39":"Evento - Campo de Provas de Levenhart","40":"O evento 'Campo de Provas de Levenhart' acontece até a manutenção programada de 4 de março de 2026 (qua).","41":"É possível entrar na zona de instância do evento 'Campo de Provas de Levenhart' pela UI de área de caça especial na barra lateral direita.","42":"Após entrar, ao conversar com o NPC 'Levenhart', inicia-se uma contagem regressiva de 10 minutos, a masmorra do evento é vinculada e a contagem de experiência do ranking começa.","43":"Quando o evento começa, surgem monstros 'Membro da Ordem de Kamen' e, em intervalos regulares, monstros evoluídos de estágio 1.","44":"Ao serem derrotados, os monstros evoluídos de estágio 1~5 podem evoluir para monstros de estágio superior conforme a probabilidade definida.","45":"Ao derrotar Kamen, é possível obter recompensas conforme a probabilidade.","46":"Evento - Bênção do Cavalo Vermelho do Ano de Byeongo","47":"O evento de Ano Novo 'Ano do Cavalo Vermelho' acontece até a manutenção programada de 4 de março de 2026 (qua).","48":"É possível entrar na masmorra do evento 'Pradaria das Almas' pelo NPC de evento 'Redin', na vila de Crow.","49":"Após entrar na masmorra, ao conversar com o NPC 'Coni', surgem monstros e cavalos; quando os cavalos surgirem 10 vezes, aparece o monstro chefe 'Centauro Senhor da Guerra'.","50":"A cada 1 minuto surge um entre três tipos de cavalo e, ao surgir o 'Corcel Vermelho', aparece o monstro 'Lobo da Tempestade'.","51":"Quando o cavalo chega a um ponto específico, é criada uma área de buff de experiência e o efeito é aplicado.","52":"O buff permanece durante o tempo de duração do buff.","53":"Outras Alterações","54":"Ajustamos o HP do 'Cristal da Floresta' que aparece na Floresta do Duelo do servidor Ilseom&Baldo.","55":"Aumentamos o intervalo de renascimento do monstro de raide 'Slime Núcleo' que aparece dentro do Acampamento dos Orcs Turek.","56":"Expandimos a área de surgimento do Slime de Ligação na área de caça correspondente.","57":"[Servidor Principal] Aviso de Atualização de 19 de fevereiro (qui)","58":"Fabricação Especial - Servidor Eva&Wolf&Valakas","59":"Adicionamos produtos que podem ser fabricados com o custo de 'Intensificador de Tintura' e 'Adena' até a manutenção programada de 4 de março de 2026 (qua).","60":"Fabricação Especial - Servidor Eva&Wolf&Valakas/Ilseom&Baldo","61":"Adicionamos produtos exclusivos de servidor que podem ser fabricados com o custo de 'Adena' até a manutenção programada de 25 de fevereiro de 2026 (qua).","62":"Os produtos com restrição de fabricação por servidor também podem ser usados no Servidor Mundial. (Aplica-se a restrição de fabricação exclusiva do Servidor Mundial)","63":"Os itens por tempo limitado obtidos na Fabricação Especial serão excluídos em massa na manutenção programada de 4 de março de 2026 (qua).","64":"Foram adicionados efeitos aos seguintes buffs.","65":"Alteramos a configuração de ataque preventivo dos monstros do evento.","66":"Adição de ataque preventivo a 'Centauro Guerreiro' e 'Centauro Atirador'","67":"Aumento do alcance de ataque preventivo de 'Lobo da Tempestade', 'Centauro Guerreiro' e 'Centauro Atirador'","68":"Aumentamos a velocidade de movimento do Corcel Vermelho e do Cavalo Branco.","69":"Melhoramos a visibilidade do Corcel Vermelho e do Cavalo Branco.","70":"Evento - Slime Gigante","71":"Da manutenção programada de 19 de fevereiro de 2026 (qui) até 25 de fevereiro de 2026 (qua), o 'Slime Gigante' surge junto com o Orc Gigante na Batalha de Fortaleza que ocorre diariamente.","72":"A cada queda de uma determinada % de HP do Slime Gigante, quem der o primeiro golpe obtém 1 'Pedra de Invocação de Slime Núcleo (por tempo limitado) [Selado]' e, ao derrotá-lo, quem der o último golpe obtém 2 'Pedra de Invocação de Slime Núcleo (por tempo limitado)'.","73":"O item 'Pedra de Invocação de Slime Núcleo (por tempo limitado) [Selado]' só pode ser usado na 'Masmorra da Transcendência / Masmorra de Treinamento / Campo de Provas de Levenhart'; ao ser invocado, surge o 'Slime Núcleo' e, ao derrotá-lo, você obtém recompensas.","74":"O item 'Pedra de Invocação de Slime Núcleo (por tempo limitado) [Selado]' será excluído na manutenção programada de 25 de fevereiro de 2026 (qua).","75":"Adicionamos 1 missão de evento que pode ser realizada durante o período do evento.","76":"Item","77":"Alteramos o item 'Recompensa do Rei Espírito (por tempo limitado) [Selado]' de caixa para vale.","78":"A data de exclusão também foi alterada para a manutenção programada de 25 de fevereiro de 2026 (qua).","79":"Os componentes são os seguintes.","80":"Alteramos os itens Arca concedidos nas missões 'Exploração do Mundo Onírico' e 'Conquista da Batalha da Fortaleza Orc' para itens por tempo limitado excluídos a cada manutenção progra lar con el NPC Erdo que aparece tras derrotar al monstruo jefe correspondiente, la Misión se completa.","105":"En el Servidor Ilseom&Baldo solo aparece el jefe de la fase 1; el jefe de la fase 2 se agregará en una actualización posterior.","106":"Caballero de la Muerte","107":"Se amplió el nivel de las habilidades de buff 'Llamado de Llama/Congelación/Relámpago' y se cambiaron los efectos de los debuffs de las habilidades activables 'Llama/Congelación/Relámpago de la Muerte'.","108":"Dominador","109":"Se simplificaron los buffs de uso directo y se ajustaron sus efectos.","110":"Es necesario aprender la Habilidad directamente en la ventana de habilidades para poder usarla.","111":"Se eliminaron las siguientes habilidades.","112":"Los SP y objetos consumidos en las habilidades eliminadas se entregan al almacén personal.","113":"Heraldo de la Perdición","114":"Se corrigió un problema por el cual los derechos de saqueo del jefe de Incursión del Puerto de Giran estaban mal configurados en los Servidores Eva/Wolf/Valakas.","115":"Todos los usuarios que participen en la Incursión tienen derechos de saqueo, sin importar su contribución.","116":"Se corrigió un problema por el cual, al mostrarse en pantalla el mensaje de obtención exitosa de puntos al usar un elixir, ocasionalmente se mostraba por error el mensaje de obtención de Muñeco.","117":"Finalizó la Batalla de Exterminio de la Legión Oscura.","118":"Para un emparejamiento de grupo más fluido, se ajustó el tiempo de reutilización del anuncio de emparejamiento de grupo a 1 minuto 30 segundos.","119":"[Servidor Principal] Aviso de Actualización del 4 de marzo (mié)","120":"Tienda L2 - Servidor Eva&Wolf&Valakas/Ilseom&Baldo","121":"Se agregaron nuevos productos a la Tienda L2.","122":"Al usar el objeto 'Fragancia de Primavera (por tiempo limitado) [Sellado]' puedes obtener los objetos de la siguiente lista de forma garantizada&aleatoria.","123":"Al usar el objeto 'Caja de Torbellino (por tiempo limitado)' puedes obtener a  NPC 'Arin' aparecen monstruos y capullos.","159":"Al derrotar monstruos se aplica la bonificación de grupo.","160":"Puedes hablar con un total de 10 capullos; tras hablar una vez, pasados 20 segundos puedes hablar con el siguiente capullo.","161":"Al hablar con un capullo que está floreciendo, se invocan abejas y Abejones Reales según la probabilidad.","162":"Se corrigió a 'Kain Van Halter' para que use la habilidad de embestida con fluidez.","163":"Se redujo el daño de la habilidad de embestida.","164":"Donación de Clan","165":"Cambia el número máximo diario de donaciones de Clan.","166":"Debido al cambio en el número máximo de donaciones, cambia la cantidad de experiencia de Clan obtenida en las donaciones avanzada y suprema.","167":"Se corrigió un problema por el cual el mapa del mundo se mostraba de forma anormal al entrar a la zona de caza especial 'Ruinas Antiguas - Cueva de Antharas'.","168":"La habilidad 'Corazón de Espada del Vendaval' indicaba un efecto que en realidad no funcionaba, por lo que se eliminó dicha información.","169":"La habilidad 'Marcha Nocturna de los Cien Demonios' no indicaba su número de ataques, por lo que se agregó dicha información.","170":"Se corrigió un problema por el cual la habilidad 'Avalancha - Juego de Carnicería' no indicaba su objeto consumible (Piedra Mágica).","171":"El Carcaj Infinito (sin grado~grado A) y el Orbe Elemental (sin grado~grado A) se unifican respectivamente en objetos únicos: Carcaj Infinito y Orbe Elemental.","172":"Los objetos Carcaj Infinito y Orbe Elemental de cada grado que se entregaban durante el crecimiento del personaje se entregan ahora una sola vez como objeto unificado en el momento en que se necesitan por primera vez.","173":"[Corrección] [Servidor Principal] Aviso de Actualización del 11 de marzo (mié)","174":"Fabricación Especial - Servidor Ilseom&Baldo","175":"Se agregaron productos que pueden fabricarse con 'Adena' como costo hasta el mantenimiento programado del 25 de marzo de 2026 (mié).  Alma de Resplandor/Sombra'.","217":"El nombre de la habilidad 'Búsqueda de Alma de Resplandor/Sombra' se cambió a 'Afinidad de Alma de Resplandor/Sombra'.","218":"'Afinidad de Alma de Resplandor/Sombra' se cambió a habilidad de buff para eliminar la pérdida de daño.","219":"El cambio se aplicó por igual a las Clases 'Portador de la Perdición' y 'Sabueso de Almas'.","220":"Se mejoró la habilidad 'Lado de Resplandor/Sombra'.","221":"Cambio del método de transformación","222":"Activación de [Fuerza Abrumadora] al usar habilidades","223":"→ Activación de [Fuerza Abrumadora] con 2% de probabilidad al atacar","224":"Fuerza Abrumadora","225":"Se agregó una nueva habilidad de grado [Legendario].","226":"Al aprender la habilidad se consume [Libro de Hechizos - Poder Abrumador: Maestro].","227":"Fuerza Abrumadora: Maestro","228":"Probabilidad de crítico de habilidad física +20%","229":"Daño crítico de habilidad física +20%","230":"Velocidad de movimiento +20","231":"Duración: 13 segundos","232":"Al derrotar un PC, 10% de probabilidad de renovar la duración","233":"Se activa un golpe adicional al usar las habilidades Fuerza - Golpe de Alma / Fuerza - Impacto de Alma","234":"Sabueso de Almas","235":"Se cambió el estilo de combate de la Clase Sabueso de Almas.","236":"Al usar habilidades de ataque se produce [Golpe de Espada] o [Rayo] según una probabilidad determinada.","237":"[Golpe de Espada] y [Rayo] se calculan como daño mágico.","238":"La parálisis (electrocución) no puede aplicarse de forma consecutiva y su duración es de 3 segundos.","239":"Aunque no se aplique la parálisis (electrocución), el daño sí se produce.","240":"En estado de [Transformación de Resplandor] o [Transformación de Sombra] aumenta la potencia de [Golpe de Espada] y [Rayo].","241":"Tatuaje","242":"Hasta antes del mantenimiento programado del 1 de abril de 2026 (mié) se realiza un evento de grabado y extracción de tatuajes sin costo, sin importar la Clase.","243":"Sin importar la Clase, se entregan obj blema por el cual ocasionalmente disminuía la Adena al regresar del Servidor Mundial al servidor original.","262":"Se corrigió un problema por el cual, al cambiar de Clase, se mostraba la UI de extracción aunque no hubiera habilidades para extraer.","263":"Se corrigió un problema por el cual, en la Guarida Secreta de la Mafia, ocasionalmente no se entregaba la recompensa por el golpe final a Luciano.","264":"[Corrección] [Servidor Principal] Aviso de Actualización del 18 de marzo (mié)","265":"Eva/Wolf/Valakas","266":"Zona de caza correspondiente","267":"Cementerio Real de Aden","268":"Pantano del Dragón de Fuego","269":"Espejismo Fantástico","270":"Campamento de Cel Mahum_Reforzado","271":"Campamento de Kruma Mahum","272":"Ilseom/Baldo","273":"Hasta el mantenimiento programado del 25 de marzo de 2026 (mié), al derrotar a determinados monstruos que aparecen en las siguientes zonas de caza puedes obtener el objeto 'Caja Sorpresa Misteriosa (por tiempo limitado)' según una probabilidad.","274":"Eva/Wolf/Valakas/Ilseom/Baldo","275":"Los objetos 'Caja Sorpresa Misteriosa (por tiempo limitado)' y 'Ticket Misterioso (por tiempo limitado) [Sellado]' obtenidos en el evento se eliminarán en el mantenimiento programado del 1 de abril de 2026 (mié).","276":"Templo de Sairax - Servidor Ilseom/Baldo","277":"En el Servidor Ilseom/Baldo, la mazmorra de emparejamiento mundial 'Templo de Sairax' se realiza todos los días a las 22:30.","278":"Se puede entrar al 'Templo de Sairax' mediante el HUD de aviso a la hora de entrada o mediante zona de caza especial → Mundo.","279":"Tras entrar, cuando se reúnen 5 personas mediante emparejamiento aleatorio en la sala de espera, el contenido comienza.","280":"Si el número de personas es insuficiente aunque haya vencido el tiempo de entrada, puedes hablar con 'Mignon' y elegir continuar el contenido o salir.","281":"Si formas grupo con las personas emparejadas, puedes obtener la bonificación de grupo.","282":"Tras iniciar la mazmorra, cada 2 minutos algunos NPC sellados se desellan y pasan a estado atacable.","283":"Evento - Caja Sorpresa Misteriosa","284":"El evento 'Caja Sorpresa Misteriosa' se realiza hasta el mantenimiento programado del 25 de marzo de 2026 (mié).","285":"Todos los días a las 22:00 se realiza el evento de Incursión 'Caja Misteriosa'.","286":"Puedes teletransportarte a la 'Isla de la Fantasía' mediante la ventana emergente de la UI del evento.","287":"Tras iniciar el evento de Incursión aparece la 'Caja Misteriosa'; quienes la golpeen y la derroten pueden obtener las siguientes recompensas.","288":"El objeto 'Caja Sorpresa Misteriosa (por tiempo limitado)' obtenido puede usarse después del mantenimiento programado del 25 de marzo de 2026 (mié).","289":"Se agregó 1 Misión que puede realizarse durante el periodo del evento.","290":"Se modificó parcialmente el suministro de puntos de Guerra de Servidores.","291":"Al derrotar al 'Espectro del Campo de Batalla' de la Fortaleza de Azabache se otorga 1 punto de Guerra de Servidores.","292":"Los puntos de Guerra de Servidores otorgados al completar la Misión de derrotar al jefe de la Fortaleza de Azabache cambian a 40 puntos.","293":"Se agregó 1 objeto que puede intercambiarse con la 'Moneda de Azabache [Sellado]' obtenida en la Fortaleza de Azabache, hasta antes del mantenimiento programado del 22 de abril de 2026 (mié).","294":"El objeto 'Pergamino de Berserker (por tiempo limitado) [Sellado]' se eliminará masivamente en el mantenimiento programado del 22 de abril de 2026 (mié).","295":"Se corrigió un problema por el cual las relaciones de hostilidad se aplicaban incorrectamente en la Fortaleza de Azabache y en la Disputa de la Fortaleza de Azabache.","296":"Guerra de Servidores - Fortaleza de Azabache","297":"Se cambió para que no se pueda atacar al mago de la guardia real de otras legiones.","298":"Se corrigió para que los mensajes de aviso de derrota de los Cuatro Reyes Celestiales y del Espectro del Campo de Batalla solo se muestren dent e entrada están ubicados Lionel Hunter y Herphah.","602":"Se entrega la habilidad 'Sello del Dominador' a todos los usuarios.","603":"Al comenzar el Asedio se entregan los buffs de Lionel Hunter y Herphah a cada miembro del equipo. Mientras esos buffs estén aplicados, los buffs y debuffs no se eliminan aunque mueras.","604":"Puedes desplazarte hacia el Guardián de Giran a través de la puerta exterior del castillo, y puedes usar la habilidad Sello del Dominador sobre el Guardián de Giran.","605":"Al sellar con éxito al Guardián de Giran, este cambia al color de ese equipo y todo el equipo rival es trasladado a la zona de entrada.","606":"Guarida Secreta de la Mafia","607":"Cambió el horario del contenido 'Guarida Secreta de la Mafia'.","608":"Mejora de UI - Texto de daño","609":"Se mejoró la visibilidad del texto de daño de las habilidades de ataque.","610":"Ajustes de la Guerra de Servidores","611":"Se ajustó el balance para un desarrollo más fluido de la Guerra de Servidores.","612":"Se establecieron diferencias en el desarrollo de la Disputa según la posición en la Guerra de Servidores del ciclo anterior.","613":"Se agregaron fuentes de suministro de puntos de Guerra de Servidores y se ajustaron los puntajes.","614":"Se agregó un efecto visual a la Caja de Suministros del Invasor para verificar la aparición y la ubicación de las recompensas.","615":"Se cambió para que, al iniciarse la invasión de monstruos en el Espejismo Fantástico, se cierre el pasaje conectado con el Oasis del Desierto.","616":"Al finalizar la invasión de monstruos, la puerta de dicho pasaje vuelve a abrirse.","617":"Mazmorra de Entrenamiento","618":"Se corrigió para que no aparezca el Barón Supremo proveniente del interior de la Cueva de los Gigantes.","619":"Se configuró para que se muestre un aviso cuando monstruos distintos de los jefes dropeen determinados objetos.","620":"Se corrigió un problema por el cual, al equipar los 'Tintes Sellados de Fuerza/Constitución/Destreza/Inteligencia/Ment o Supremo~Legendario (por tiempo limitado) [Sellado] puedes elegir e intercambiar los objetos de la siguiente lista.","637":"Guerra de Servidores - Servidor Ilseom&Baldo","638":"Se agregó la Guerra de Servidores al Servidor Ilseom/Baldo.","639":"Se corrigieron y agregaron misiones relacionadas con la Guerra de Servidores.","640":"Los puntos de Guerra de Servidores pueden obtenerse de forma individual mediante las recompensas por posición de la Disputa de la Fortaleza de Azabache, las recompensas por completar la Misión de la Fortaleza de Azabache, la Misión de la Invasión de la Legión Oscura y sus recompensas por golpe final, la recompensa por golpe final al Espectro del Campo de Batalla, la recompensa por golpe final a Luciano y la recompensa por el puesto 1 del Bosque del Duelo.","641":"Mazmorra de instancia de alianza - Templo de la Secta","642":"Se agregó la mazmorra de instancia de alianza - Templo de la Secta.","643":"Puedes entrar al 'Templo de la Secta' mediante el NPC guardián de mazmorras 'Erdo' de la Aldea del Castillo de Aden.","644":"No hay penalización de experiencia si el personaje muere durante la mazmorra.","645":"Al entrar a la zona de instancia se te traslada a la sala de espera.","646":"Los monstruos que aparecen son los siguientes.","647":"Al derrotar a los monstruos de la Guardia Personal de Andreas de cada sala de la sala de espera, se abre de forma aleatoria la puerta que lleva a la capilla.","648":"Evento de Guerra de Servidores","649":"Los buffs otorgados en la Fortaleza de Azabache / Disputa de la Fortaleza de Azabache incluyen el efecto de reducción de consumo de Piedra Mágica.","650":"Al aplicarse las habilidades 'Bendición de la Legión' y 'Maldición de la Legión', desaparece el efecto del Pergamino de Mafr, que tiene el mismo efecto.","651":"Mientras estén aplicadas las habilidades 'Bendición de la Legión' y 'Maldición de la Legión', el Pergamino de Mafr no se utiliza.","652":"Tras la finalización del evento el 10 de junio, los efectos de buff se reorganizarán de forma adecuada al entorno de las zonas de caza o se convertirán en buffs permanentes.","653":"Incursión y zonas de caza","654":"Se ajustó al alza la capacidad defensiva de los jefes de Incursión de las Ruinas Antiguas.","655":"Se ajustó al alza el balance de los monstruos del Bosque del Duelo, el Puerto de Giran, Amad de la batalla de fortaleza y la Guarida Secreta de la Mafia en los Servidores Ilseom/Baldo y en el Servidor Eva.","656":"En el Servidor Ilseom&Baldo finalizó la zona de caza mundial por tiempo 'Torre de Elmoaden'.","657":"Se redujo la Adena dropeada por los monstruos que aparecen en la Fortaleza de Azabache.","658":"Se cambió para que en la ventana de objetivo de los NPC que poseen habilidades de resistencia al daño de área se muestre el icono de dicha habilidad.","659":"Se corrigió un problema por el cual la posición de teletransporte de la zona de caza Cementerio Nacional estaba mal configurada.","660":"Se corrigió un problema por el cual no se consumían flechas al atacar con arco.","661":"Se corrigió un problema por el cual, tras participar en el Asedio de Giran y hablar con los NPC Lionel Hunter o Herphah, ocasionalmente no se completaba la Misión 'Participación en el Asedio de Giran'.","662":"Se corrigió un problema por el cual, al usar la habilidad 'Golpe de Dragón', el efecto del dragón no se veía según el terreno o el ángulo de la cámara.","663":"Se corrigió un problema por el cual los personajes trasladados forzosamente al Laberinto Subterráneo por penalización de PK podían salir del Laberinto Subterráneo usando el teletransporte libre.","664":"[Servidor Principal] Aviso de Actualización del 20 de mayo (mié)","665":"Tienda L2 - Eva&Wolf&Valakas/Ilseom&Baldo","666":"Se agregaron 2 productos disponibles para compra hasta el mantenimiento programado del 4 de junio de 2026 (jue).","667":"Al usar el objeto 'Paquete Premium de Agathion (por tiempo limitado) [Sellado]' puedes obtener los objetos de la siguiente lista.","668":"Al usar el objeto 'Caja de Agathion Elemental +8~+9 (por tiempo limitado)' puedes obtener los objetos de la siguiente lista según la probabilidad.","669":"Al usar el objeto 'Paquete Premium de Libros de Hechizos (por tiempo limitado) [Sellado]' puedes obtener los objetos de la siguiente lista.","670":"Al usar el objeto 'Vale de Piedra de Carga de Encantamiento de Habilidad (por tiempo limitado) [Sellado]' puedes elegir y obtener 1 de los siguientes objetos.","671":"Los objetos por tiempo limitado obtenidos en la Tienda L2 se eliminarán masivamente en el mantenimiento programado del 10 de junio de 2026 (mié).","672":"Eva&Wolf&Valakas","673":"Objeto intercambiable","674":"Energía del Jardín del Génesis","675":"Comisión en Adena","676":"Pergamino de Encantamiento de Arma Bendito (por tiempo limitado) [Sellado] 1 unidad","677":"430 unidades","678":"1,840,000","679":"Ilseom&Baldo","680":"Se agregó un producto de Fabricación Especial que puede fabricarse con el objeto de evento 'Energía del Jardín del Génesis (por tiempo limitado) [Sellado]' como costo hasta el 10 de junio de 2026 (mié).","681":"Se agregó un producto de fabricación exclusivo de servidor que puede fabricarse con el objeto de evento 'Energía del Jardín del Génesis (por tiempo limitado) [Sellado]' y Adena como costo hasta el 10 de junio de 2026 (mié).","682":"Evento - Vuelve al Puerto de Giran (Servidor Eva&Wolf&Valakas/Ilseom&Baldo)","683":"Se agregaron 2 nuevos productos de evento a la Tienda L2.","684":"Al usar el objeto 'Paquete de Regalo del Héroe de Giran (por tiempo limitado) [Sellado]' puedes obtener de forma garantizada los objetos de la siguiente lista.","685":"Al usar el objeto 'Pergamino de Giran (por tiempo limitado) [Sellado]' puedes recibir los siguientes efectos.","686":"El objeto 'Paquete de 1000 Vales de Selección de Gema (por tiempo limitado) [Sellado]' solo puede ser usado por personajes de nivel 88 o superior.","687":"Los objetos por tiempo limitado y las habilidades de buff obtenidos en la Tienda L2 se eliminarán masivamente en el mantenimiento programado del 17 de junio de 2026 (mié).","688":"Evento - Cambio de Clase (Eva&Wolf&Valakas/Ilseom&Baldo)","689":"Se agregaron nuevos productos relacionados con el cambio de Clase, disponibles para compra en la Tienda L2 hasta el mantenimiento programado del 10 de junio de 2026.","690":"El evento de Registro de Asistencia se realiza hasta el mantenimiento programado del 17 de junio de 2026 (mié).","691":"Los objetos por tiempo limitado y las habilidades de buff obtenidos en el Registro de Asistencia se eliminarán masivamente en el mantenimiento programado del 17 de junio de 2026 (mié).","692":"Evento - Jardín del Génesis","693":"El evento 'Jardín del Génesis' se realiza hasta el mantenimiento programado del 10 de junio de 2026 (mié).","694":"Puedes entrar a la mazmorra del evento 'Jardín del Génesis' mediante la NPC del evento 'Sylphy' en la Aldea del Castillo de Giran.","695":"Tras entrar a la mazmorra, al hablar con el NPC 'Arne' comienza el evento y aparecen los monstruos.","696":"Al iniciar la mazmorra y tras cada derrota, cada 30~90 segundos aparece según la probabilidad 1 de los siguientes 3 monstruos con título y alta experiencia.","697":"Al derrotar un monstruo con título se informa por adelantado la información y la hora de aparición del siguiente monstruo con título.","698":"Al derrotar monstruos con título puedes obtener el objeto 'Energía del Jardín del Génesis (por tiempo limitado) [Sellado]'.","699":"Decoración de Nombre - Mar de Verano","700":"Decoración de Nombre - Mar de Verano 1 unidad","701":"1 unidad","702":"100,000","703":"5 veces por semana por servidor","704":"Piedra Mágica [Sellado] 10 unidades","705":"Efecto de Muerte - Bomba de Agua Refrescante","706":"Efecto de Muerte - Bomba de Agua Refrescante 1 unidad","707":"Apariencia de Armadura - Traje de Baño Seductor","708":"10,000","709":"Los objetos por tiempo limitado obtenidos en el evento 'Jardín del Génesis' se eliminarán masivamente en el mantenimiento programado del 10 de junio de 2026 (mié).","710":"Actualización de Clase - Embaucador","711":"Se agregó una nueva habilidad de ataque.","712":"'Disparo Trickal' y 'Dardo Trickal' se potencian respectivamente a 'Disparo Trickal - Trascendencia' y 'Dardo Trickal - Trascendencia' en la Mazmorra de Trascendencia.","713":"'Arresto Trickal' es una habilidad resultante de modificar el antiguo 'Arresto en Cadena'.","714":"Los efectos de 'Método Trickal' son los siguientes.","715":"Los efectos de 'Fisura del Alma' son los siguientes.","716":"Se agregó una nueva habilidad de buff.","717":"Evento - Descuento en el costo de extracción de habilidades encantadas","718":"Hasta el mantenimiento programado del 10 de junio de 2026 se realiza un evento de 50% de descuento en la comisión de extracción de habilidades encantadas y de uso de vales de garantía.","719":"Evento - Cupón Negro","720":"En el día 1 del Registro de Asistencia se entrega un Cupón Negro.","721":"Con el objeto 'Cupón Negro - Equipo Especial (por tiempo limitado) [Sellado]' puedes recuperar como objeto 'Sellado' un objeto que falló al encantar, o canjearlo por 'Piedra de Encantamiento Avanzada (por tiempo limitado) [Sellado]' o '+5 Caja de Equipo Especial (por tiempo limitado) [Sellado]'.","722":"Los objetos Cristal de Trascendencia obtenidos mediante la recuperación con el Cupón Negro pueden usarse como material al intentar la trascendencia de cada objeto. La probabilidad de éxito de trascendencia y la comisión de síntesis son iguales a las actuales.","723":"Los objetos Cristal de Trascendencia pueden usarse de la siguiente manera.","724":"Con el objeto 'Cupón Negro - Síntesis de Muñecos (por tiempo limitado) [Sellado]' puedes recuperar el vale de resíntesis del grado más alto entre los historiales de síntesis de Muñecos fallidas, o canjearlo por 'Vale de Invocación de Muñeco (Común~Héroe) - 11 usos (por tiempo limitado) [Sellado]' o 'Vale de Selección de Muñeco Supremo (por tiempo limitado) [Sellado]'.","725":"Los objetos por tiempo limitado relacionados con el Cupón Negro se eliminarán masivamente en el mantenimiento programado del 17 de junio de 2026 (mié).","726":"Se eliminaron las misiones 'Exploración del Jardín Primigenio', 'Exploración del Jardín Submarino de Eva' y 'Exploración del Jardín del Poder' que se realizaban en el 'Jardín Olvidado'.","727":"Se agregaron nuevas misiones que pueden realizarse en el 'Jardín Olvidado'.","728":"Se cambió el nivel requerido de la Misión 'El Camino del Entrenamiento Constante', que se realiza en la Mazmorra de Entrenamiento, para que sea igual al nivel de entrada a la Mazmorra de Entrenamiento.","729":"Mercado Mundial","730":"Se agregó la categoría 'Guardián' al Mercado Mundial.","731":"Se mejoró para que los objetos de invocación de Guardián desellados puedan registrarse en el Mercado Mundial.","732":"Al registrar un Guardián en el Mercado Mundial se conservan su etapa/nombre/nivel/maestría/habilidades.","733":"Las condiciones de uso del Mercado Mundial para el collar de Guardián y los contratos son las siguientes.","734":"Solo pueden registrarse Guardianes de nivel 40 o superior.","735":"No pueden registrarse en el Mercado Mundial mientras estén equipados o invocados.","736":"Se corrigió un problema por el cual ocasionalmente Andreas Van Halter no usaba la habilidad de Atadura Aérea.","737":"Se corrigió un problema por el cual no se podía usar el objeto 'Pergamino de 2000 SP (Sellado)'.","738":"[Corrección] [Servidor Principal] Aviso de Actualización del 27 de mayo (mié)","739":"Objetos -Gema","740":"Corrección de los efectos por nivel de Rubí/Ópalo","741":"Estimado cliente de Lineage2, hola.","742":"Agradecemos a todos los clientes que aman Lineage2,","743":"y les informamos a continuación sobre la actualización del 27 de mayo (mié).","744":"Objetos - Gema","745":"Se amplió el nivel máximo de las 6 Gemas existentes de Lv8 a Lv10.","746":"Las nuevas Gemas pueden obtenerse mediante la síntesis de Gemas Esmeralda/Rubí/Zafiro/Aguamarina/Ámbar/Ópalo Lv8 y Lv9.","747":"Los efectos por nivel de las nuevas Gemas son los siguientes.","751":"Zona de caza especial","752":"Se agregó la nueva zona de caza 'Ruinas de Tempest' dentro de 'Ruinas Antiguas'.","753":"Al entrar a 'Ruinas Antiguas' se accede a una sala de espera configurada como zona PVE.","754":"Existen 4 entradas, y desde cada una se puede acceder a las zonas de caza 'Cueva de Antharas', 'Castillo del Señor del Hielo', 'Horno de Vulcan' y 'Ruinas de Tempest'.","755":"Puedes desplazarte al interior de la zona de caza mediante el NPC de traslado ubicado en cada entrada o dirigiéndote a la entrada.","756":"A las 20:00 se determina si habrá Incursión de jefe en cada zona de caza, y la entrada de la zona de caza con Incursión de jefe prevista muestra un efecto propio.","757":"Todos los lunes, martes, miércoles y jueves a las 22:00 aparece un jefe según la probabilidad, y el jefe desaparece a las 00:00 del día siguiente.","758":"Se eliminaron las misiones 'Exploración de la Cueva de Antharas' y 'Exploración del Castillo del Señor del Hielo' que se realizaban en 'Ruinas Antiguas'.","759":"Se agregaron nuevas misiones que pueden realizarse en 'Ruinas Antiguas'.","760":"Clase - Embaucador","761":"Se ajustó el efecto de 'Transformación de Resplandor/Sombra Lv2', el buff activado por 'Maestría de Resplandor/Sombra Lv2'.","762":"Además, se mejoró para que las máquinas de combate invocadas en estado de 'Transformación de Resplandor/Sombra' mantengan su estado de invocación incluso tras un cambio de posición por desplazamiento entre mundos.","763":"Se ajustó el tiempo de reutilización de la habilidad 'Engaño' y se ajustaron los efectos de 'Reorganización', el buff que activa.","764":"Se ajustaron los efectos de 'Bombardeo de Alfombra' y 'Defecto de Diseño', los debuffs activados por 'Arquero Legendario/Arquero Legendario: Maestro'.","765":"Clase - Sagitario, Centinela de la Luz de Luna, Centinela Fantasma","766":"Disparo Atador → Se mejoró el efecto de buff y se amplió su nivel.","767":"Se agregó poder de ataque +500 al Disparo Atador Lv1.","768":"Se agregó la habilidad Disparo Atador de nivel 2.","769":"Mundo - Se corrigió un problema por el cual no era posible el PVP en la zona de caza Templo de la Secta.","770":"Se corrigió un problema por el cual el jefe mundial 'Andreas Van Halter' ocasionalmente no usaba la habilidad 'Atadura Aérea'.","771":"Se mejoró para que los efectos de buff de Héroe~Legendario no sean eliminados al ser desplazados por otros efectos de buff.","772":"Habilidades afectadas: Escudo Fénix, Arquero Legendario, Refugio, Serenidad, Sobrecarga, Toque de Pa'agrio","773":"Se corrigió un problema por el cual faltaba la información sobre la resistencia a 'derribo' en la información emergente del objeto 'Muñeco de Antharas Lv1~Lv6'.","774":"Se complementó la información emergente del objeto '<Restaurar MP> Piedra de Carga de Encantamiento de Habilidad (por tiempo limitado) [Sellado]'.","775":"Al usar el objeto ‘Cupón de Canje de Piedra de Refinado de Año Nuevo (Por tiempo limitado) [Sellado]’ se puede elegir y canjear 1 de los objetos indicados abajo.","776":"Al usar el objeto ‘Cupón de Canje de Potenciador de Tinte de Año Nuevo (Por tiempo limitado) [Sellado]’ se puede elegir y canjear 1 de los objetos indicados abajo.","777":"Los objetos (Por tiempo limitado) obtenidos al usar el objeto ‘Bolsa de la Suerte de Año Nuevo (Por tiempo limitado) [Sellado]’ se someterán a eliminación masiva en el mantenimiento programado del 4 de marzo de 2026 (mié).","778":"El Cupón de Cambio de Clase está configurado como producto de relevo, por lo que el costo de compra es distinto en la 1.ª/2.ª ronda.","779":"Los objetos por tiempo limitado obtenidos en la Tienda L2 se someterán a eliminación masiva en el mantenimiento programado del 1 de abril de 2026 (mié).","780":"Se agregaron 3 productos de cambio de Clase en el ‘Servidor Principal’, que se pueden fabricar con distintos costos hasta el mantenimiento programado del 18 de marzo de 2026 (mié).","781":"El producto ‘Cupón de Canje de Libro de Hechizos Legendario’ no se puede fabricar en el Servidor Mundial.","782":"El producto ‘Orbe de la Inmortalidad Refinado’ solo se puede fabricar en el Servidor Mundial.","783":"‘Rayo del Infierno’ se activa con cierta probabilidad al atacar, aplica daño fijo que ignora las barreras y el CP, y tiene un tiempo de espera de reactivación de 300 segundos.","784":"Cuando se equipan al mismo tiempo ‘Talismán de Hellbound - Trascendencia’ y un talismán de nivel inferior, solo se aplica el efecto del nivel más alto.","785":"Al atacar a un monstruo teniendo la Runa Mágica Lv19, 20, se usa una Habilidad de activación según la probabilidad.","786":"Los efectos especiales de la ‘Armadura Celestial - Yelmo’ son los siguientes.","787":"Las opciones de refinado de la ‘Armadura Celestial - Yelmo’ son las siguientes.","788":"Las opciones de bendición de la ‘Armadura Celestial - Yelmo’ son las siguientes.","789":"La ‘Armadura Celestial - Guanteletes’ se puede encantar con el ‘Pergamino de Encantamiento de Equipo Legendario’, y las opciones de cada nivel de encantamiento son las siguientes.","790":"Los objetos por tiempo limitado obtenidos en la Fabricación Especial se someterán a eliminación masiva en el mantenimiento programado del 4 de junio de 2026.","791":"Se agregaron 7 productos que se pueden fabricar usando como costo el objeto ‘Boleto de Agradecimiento de Juego & Regreso (Por tiempo limitado) [Sellado’, hasta el mantenimiento programado del 17 de junio de 2026 (mié).","792":"El objeto ‘Cupón de Cambio de Clase (Por tiempo limitado) [Sellado]’ es un producto de relevo y se puede comprar de forma secuencial","793":"‘Los objetos de los 8 tipos de Cupón de Cambio se someterán a eliminación masiva en el mantenimiento programado del 17 de junio de 2026 (mié).","794":"Se agregó 1 producto de fabricación en el ‘Servidor Eva&Wolf&Valakas/Ilseom&Baldo’, que se puede fabricar hasta el mantenimiento programado del 10 de junio de 2026.","795":"Se agregó 1 producto de fabricación que solo se puede fabricar en el ‘Servidor Mundial Eva/Ilseom&Baldo’ hasta el mantenimiento programado del 10 de junio de 2026.","796":"Se eliminó el efecto ‘Interrupción de Lanzamiento de Habilidad’ de las Habilidades que usa Amber."},"fr":{"1":"[Correction] [Serveur Principal] Avis de Mise à Jour du 11 février (mer)","2":"Boutique Unique - Serveur Eva&Wolf&Valakas/Ilseom&Baldo","3":"Le nouveau contenu 'Boutique Unique' est proposé jusqu'à la maintenance programmée du 25 février 2026 (mer).","4":"Lorsque l'interface 'Boutique Unique' de la barre latérale droite s'ouvre, vous pouvez participer avec 1 utilisation ou 11 utilisations.","5":"Choisir 11 utilisations offre une réduction par rapport à 1 utilisation.","6":"Les frais d'utilisation sont les suivants.","7":"Les récompenses sont réparties en rang B, rang A et rang S, le rang le plus bas étant B et le plus élevé S.","8":"La Boutique Unique offre, à chaque palier de 100 utilisations cumulées, une chance d'obtenir de façon garantie uniquement des objets de rang A ou supérieur.","9":"Eva/Wolf/Valakas/Crow","10":"Monstre boss","11":"Probabilité de drop","12":"Objet droppé","13":"Seigneur de Guerre Centaure","14":"1 type droppé parmi 3","15":"Pierre des Âmes d'Aden Lv1 - 1 Arme","16":"Fabrication Spéciale Événement - Serveur Eva&Wolf&Valakas/Ilseom&Baldo","17":"2 produits fabricables jusqu'à la maintenance programmée du 25 février 2026 (mer) ont été ajoutés.","18":"6 produits fabricables jusqu'à la maintenance programmée du 4 mars 2026 (mer) ont été ajoutés.","19":"Les objets (à durée limitée) obtenus via la Fabrication Spéciale feront l'objet d'une suppression groupée lors de la maintenance programmée du 4 mars 2026 (mer).","20":"L'objet Pièce du Nouvel An (à durée limitée) fera l'objet d'une suppression groupée lors de la maintenance programmée du 11 mars 2026 (mer).","21":"En utilisant l'objet '+7~+8 Coffre de Bon d'Échange
