  --oxblood:#CE6165; --oxblood-soft:#2A1A1C;

}
:root[data-theme="light"]{
  --stone:#E9E9E6; --panel:#FFFFFF; --sunk:#DEDEDA;

  --rule:#CFCFC9; --rule-2:#E1E1DC;

}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;background:var(--stone);color:var(--ink);font-family:var(--sans);
  font-size:15px;line-height:1.65;-webkit-font-smoothing:antialiased}
.wrap{max-width:1180px;margin:0 auto;padding:0 24px 96px}

.topbar{display:flex;justify-content:flex-end;gap:4px;padding:18px 0 0;min-height:22px}
.lang{font:inherit;font-size:12px;letter-spacing:.08em;font-weight:600;padding:5px 9px;
  cursor:pointer;color:var(--ink-3);background:none;border:1px solid transparent;border-radius:2px}
.lang:hover{color:var(--ink)}
.lang[aria-pressed=true]{color:var(--oxblood);border-color:var(--rule);background:var(--panel)}

header.mast{padding:26px 0 28px;border-bottom:1px solid var(--rule)}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);
  font-weight:600;margin:0 0 14px}
h1{font-family:var(--serif);font-weight:700;font-size:clamp(26px,4vw,44px);line-height:1.18;
  margin:0 0 16px;text-wrap:balance;letter-spacing:-.01em}
h1 .sep{color:var(--oxblood)}
.lede{max-width:64ch;color:var(--ink-2);margin:0 0 22px;font-size:16px}
.meta{display:flex;flex-wrap:wrap;gap:8px 28px;font-size:13px;color:var(--ink-3);
  font-variant-numeric:tabular-nums}
.meta b{color:var(--ink-2);font-weight:600}
.meta a{color:var(--oxblood);text-underline-offset:3px}

.note{display:grid;grid-template-columns:auto 1fr;gap:16px;align-items:start;
  margin:22px 0 0;padding:15px 18px;border-radius:2px;
  background:var(--panel);border:1px solid var(--rule)}
.note .rune{font-family:var(--serif);font-size:20px;line-height:1.2;color:var(--ink-3)}
.note h2{font-size:14px;margin:0 0 4px;letter-spacing:.02em;color:var(--ink-3)}
.note p{margin:0;font-size:14px;color:var(--ink-2)}
.note[hidden]{display:none}

.cols{display:grid;grid-template-columns:236px 1fr;gap:48px;margin-top:40px;align-items:start}
@media(max-width:860px){.cols{grid-template-columns:1fr;gap:28px}}
.rail{position:sticky;top:24px;display:flex;flex-direction:column;gap:26px}
@media(max-width:860px){.rail{position:static}}
.fgroup{display:flex;flex-direction:column;gap:10px}
.flabel{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);font-weight:600}
input[type=search]{width:100%;padding:10px 12px;font:inherit;font-size:14px;color:var(--ink);

input[type=search]::placeholder{color:var(--ink-3)}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font:inherit;font-size:13px;padding:5px 11px;cursor:pointer;color:var(--ink-2);

@media(prefers-reduced-motion:no-preference){.chip{transition:background .12s,color .12s,border-color .12s}}
.chip:hover{border-color:var(--ink-3)}
.chip[aria-pressed=true]{background:var(--oxblood);border-color:var(--oxblood);color:#fff}
.chip.mon[aria-pressed=true]{background:var(--steel);border-color:var(--steel);color:#fff}
label.tog{display:flex;gap:9px;align-items:flex-start;font-size:13px;color:var(--ink-2);cursor:pointer}
label.tog input{margin:4px 0 0;accent-color:var(--oxblood);flex:none}
label.tog .sub{color:var(--ink-3);font-size:12px;display:block}
label.tog[hidden]{display:none}
.count{font-size:13px;color:var(--ink-3);font-variant-numeric:tabular-nums;

.reset{align-self:flex-start;font:inherit;font-size:12px;color:var(--ink-3);background:none;
  border:0;padding:0;cursor:pointer;text-decoration:underline;text-underline-offset:3px}
.reset:hover{color:var(--oxblood)}

.ledger{position:relative;padding-left:26px;min-width:0}
.ledger::before{content:"";position:absolute;left:0;top:10px;bottom:10px;width:1px;background:var(--rule)}
.entry{position:relative;padding:0 0 40px}
.entry::before{content:"";position:absolute;left:-30px;top:11px;width:7px;height:7px;
  border-radius:50%;background:var(--stone);border:1px solid var(--ink-3)}
.entry.named::before{background:var(--oxblood);border-color:var(--oxblood)}
.ehead{display:flex;flex-wrap:wrap;gap:6px 14px;align-items:baseline}
.date{font-family:var(--serif);font-size:19px;font-weight:700;color:var(--ink);
  font-variant-numeric:tabular-nums;letter-spacing:.01em}
.badge{font-size:11px;letter-spacing:.06em;padding:2px 7px;border-radius:2px;font-weight:600}
.b-fix{background:var(--sunk);color:var(--ink-2)}
.b-pre{background:var(--gold-soft);color:var(--gold);border:1px solid var(--gold-rule)}
.fam{font-size:11px;letter-spacing:.06em;padding:2px 7px;border-radius:2px;font-weight:600;
  background:var(--steel-soft);color:var(--steel)}
.etitle{margin:2px 0 14px;font-size:14px;color:var(--ink-3)}
.etitle a{color:var(--ink-3);text-underline-offset:3px}
.etitle a:hover{color:var(--oxblood)}

.sec{border-left:2px solid var(--rule-2);padding:2px 0 2px 15px;margin:0 0 16px}

.sec.all{border-left-color:var(--steel)}
.shead{font-size:13px;font-weight:700;color:var(--ink);margin:0 0 6px;letter-spacing:.01em}
.sec.named .shead{color:var(--oxblood)} .sec.all .shead{color:var(--steel)}
.stag{font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;
  color:var(--ink-3);margin-left:8px}
ul{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:5px}
li{font-size:14px;color:var(--ink-2);padding-left:14px;position:relative;max-width:74ch}
li::before{content:"";position:absolute;left:0;top:.72em;width:5px;height:1px;background:var(--ink-3)}
.ko-orig{display:block;font-size:12.5px;color:var(--ink-3);margin-top:2px}
mark{background:var(--gold-soft);color:var(--ink);padding:0 2px;border-radius:1px;

.more{font-size:12px;color:var(--ink-3);font-style:italic;padding-left:14px;margin:5px 0 0}
.more a{color:var(--ink-3)}
.wolf{font-size:11px;color:var(--gold);letter-spacing:.04em;margin-left:6px;white-space:nowrap}

.empty{padding:56px 0;color:var(--ink-3);font-size:15px;max-width:60ch}

footer{margin-top:24px;padding-top:22px;border-top:1px solid var(--rule);
  font-size:13px;color:var(--ink-3);max-width:74ch;display:flex;flex-direction:column;gap:7px}
footer a{color:var(--ink-2)}
.sw{display:inline-block;width:9px;height:9px;border-radius:1px;margin-right:3px}
a:focus-visible,button:focus-visible,input:focus-visible{outline:2px solid var(--focus);outline-offset:2px}

llows.","751":"Special Hunting Ground","752":"Added the new hunting ground 'Ruins of Tempest' within the 'Ancient Ruins'.","753":"On entering the 'Ancient Ruins', you enter a waiting room set as a PVE zone.","754":"There are 4 entrances, each allowing entry to the 'Antharas' Cave', 'Castle of the Ice Lord', 'Vulcan's Furnace', and 'Ruins of Tempest' hunting grounds.","755":"You can move to the inner area of a hunting ground through the transport NPC placed at each entrance or by moving to the entrance.","756":"At 20:00, whether each hunting ground has a boss Raid is determined, and the entrance of a hunting ground scheduled for a boss Raid displays a unique effect.","757":"Every Monday, Tuesday, Wednesday, and Thursday at 22:00, a boss appears by chance, and the boss disappears at 00:00 the next day.","758":"Deleted the 'Antharas' Cave Exploration' and 'Castle of the Ice Lord Exploration' Missions performed in the 'Ancient Ruins'.","759":"Added new Missions that can be performed in the 'Ancient Ruins'.","760":"Class - Trickster","761":"Adjusted the effects of 'Shine/Shadow Transform Lv2', the buff triggered by 'Shine/Shadow Mastery Lv2'.","762":"Also, improved it so that combat weapons summoned while in the 'Shine/Shadow Transform' state remain summoned even after a position change due to world movement and the like.","763":"Adjusted the cooldown of the 'Deception' Skill and adjusted the effect of 'Reorganization', the buff it triggers.","764":"Adjusted the effects of 'Carpet Bombing' and 'Design Flaw', the debuffs triggered by 'Legendary Archer/Legendary Archer: Master'.","765":"Class - Sagittarius, Moonlight Sentinel, Ghost Sentinel","766":"Binding Shot → Improved the buff effect and expanded its levels.","767":"Added Attack Power +500 to Binding Shot Lv1.","768":"Added a level 2 Binding Shot Skill.","769":"Fixed an issue where PVP was not possible in the World - Temple of the Cult hunting ground.","770":"Fixed an issue where the world boss 'Andreas van Halter' so  links to the Korean original.","statNotices":"notices","statChanges":"change items","statServers":"servers","statUpdated":"Updated","statSource":"Source","sourceLink":"official update board","mtTitle":"Unofficial machine translation","mtBody":"Only the Korean original is authoritative. Item and skill names may differ from official localized names.","lblSearch":"Search","phSearch":"gem, server war, seal…","lblServer":"Server","lblMonth":"Month","lblOnlyNamed":"Only items naming a server","subOnlyNamed":"Hides items that apply to the whole notice","lblShowKo":"Show Korean original","reset":"Reset filters","cntNotices":"notices","cntItems":"change items","unit":"","unitItems":"","tagAll":"Whole notice","more":"+{n} more, see original","wolfFlag":"Wolf not listed","badgeFix":"Revised","badgePre":"Advance notice","emptyTitle":"No matching entries.","emptyHint":"Try adjusting the search term or server filter.","emptyNamed":"This server's notices never name servers in their subheadings. Clear the filter to see the changes that apply to the whole notice.","foot1":"This page is a summary index of official notices. For exact figures, item lists and tables, follow the original link on each entry.","foot2":"Items naming a server · Items applying to every server in that notice","foot3":"Some notices are tagged without Wolf (Main/Eva/Valakas). Original subheadings are reproduced as-is, so check the server names.","foot4":"All content is copyright NCSOFT. This is an unofficial fan index, not affiliated with NCSOFT. Dates are KST posting dates.","footPending":"The English translation is being regenerated.","servers":{"main":"Main","eva":"Eva","wolf":"Wolf","valakas":"Valakas","ilseom":"Ilseom","baldo":"Baldo","talking":"Talking Island"}}},"langs":["ko","en"],"servers":["main","eva","wolf","valakas","ilseom","baldo","talking"],"source":"https://lineage2.plaync.com/board/l2update/list","updated":"2026-07-13","stats":{"notices":27,"items":1529,"servers":7}};
const state = {lang: D.langs[0], q:"", servers:new Set(), months:new Set(),
               onlyNamed:false, showKo:false};

const $ = s => document.querySelector(s);
const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const T = id => D.i18n[state.lang][id] ?? D.i18n.ko[id] ?? "";
const KO = id => D.i18n.ko[id] ?? "";
const U = () => D.ui[state.lang];

// months present in the data, not hardcoded to a window
const MONTHS = [...new Set(D.notices.map(n => n.d.slice(0,7)))].sort();

function hl(s, q){
  const e = esc(s);
  if(!q) return e;
  const rx = new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");
  return e.replace(rx, "<mark>$1</mark>");
}

function chips(el, entries, cls, set){
  el.innerHTML = "";
  entries.forEach(([k,label])=>{
    const b=document.createElement("button");
    b.type="button"; b.className="chip"+(cls?" "+cls:"");
    b.textContent=label; b.dataset.k=k;
    b.setAttribute("aria-pressed", set.has(k) ? "true":"false");
    b.onclick=()=>{ set.has(k)?set.delete(k):set.add(k);
      b.setAttribute("aria-pressed", set.has(k)); render(); };
    el.appendChild(b);
  });
}

function monthLabel(ym){
  const [y,m] = ym.split("-").map(Number);
  try { return new Intl.DateTimeFormat(state.lang, {month:"short"}).format(new Date(y, m-1, 1)); }
  catch(e){ return ym; }
}

function applyLang(){
  const u = U();
  document.documentElement.lang = state.lang;
  document.title = "Paçoca · " + u.title;
  ["eyebrow","lede","mtTitle","mtBody","lblSearch","lblServer","lblMonth",
   "lblOnlyNamed","subOnlyNamed","lblShowKo","foot1","foot2","foot3","foot4"
  ].forEach(k=>{ const n=$("#"+k); if(n) n.textContent=u[k]; });
  $("#h1").textContent = u.title;
  $("#reset").textContent = u.reset;
  $("#q").placeholder = u.phSearch;
  $("#srcFoot").textContent = u.sourceLink;
  $("#srcFoot").href = D.source;
  // only meaningful while some languages are still untranslated
  $("#footPending").textContent = D.langs.length < 2 ? u.footPending : "";
  $("#stats").innerHTML =
    `<span><b>${D.stats.notices}</b> ${esc(u.statNotices)}</span>`+
    `<span><b>${D.stats.items.toLocaleString(state.lang)}</b> ${esc(u.statChanges)}</span>`+
    `<span><b>${D.stats.servers}</b> ${esc(u.statServers)}</span>`+
    `<span>${esc(u.statUpdated)} <b>${D.updated}</b></span>`+
    `<span>${esc(u.statSource)} <a href="${D.source}" target="_blank" rel="noopener">`+
      `${esc(u.sourceLink)} →</a></span>`;
  $("#mtNote").hidden = state.lang === "ko";
  $("#koRow").hidden  = state.lang === "ko";
  if(state.lang==="ko"){ state.showKo=false; $("#showKo").checked=false; }
  chips($("#servers"), D.servers.map(s=>[s, u.servers[s]]), "", state.servers);
  chips($("#months"), MONTHS.map(m=>[m, monthLabel(m)]), "mon", state.months);
  [...document.querySelectorAll(".lang")].forEach(b=>
    b.setAttribute("aria-pressed", b.dataset.l===state.lang));
  try{ localStorage.setItem("pacoca-lang", state.lang); }catch(e){}
}

function render(){
  const u = U(), q = state.q.trim(), ql = q.toLowerCase();
  const sel = state.servers;
  const out = []; let nEntries=0, nItems=0, suppressedNamed=false;

  D.notices.forEach(a=>{
    if(state.months.size && !state.months.has(a.d.slice(0,7))) return;
    // a notice is relevant if any selected server belongs to its family
    if(sel.size && !a.f.some(s=>sel.has(s))) return;

    let secs = a.S.filter(s=>{
      const named = s.s.length > 0;
      if(state.onlyNamed && !named) return false;
      if(!sel.size) return true;
      // an untagged section applies to every server in the notice's family
      return named ? s.s.some(x=>sel.has(x)) : !state.onlyNamed;
    });
    if(ql) secs = secs.filter(s => T(s.h).toLowerCase().includes(ql)
                                || s.b.some(id=>T(id).toLowerCase().includes(ql)));
    if(!secs.length){ if(state.onlyNamed) suppressedNamed = true; return; }

    nEntries++; nItems += secs.reduce((n,s)=>n+s.n,0);

    const badges = (a.fix?`<span class="badge b-fix">${esc(u.badgeFix)}</span>`:"")
                 + (a.pre?`<span class="badge b-pre">${esc(u.badgePre)}</span>`:"")
                 + `<span class="fam">${esc(a.f.map(s=>u.servers[s]).join(a.f.length>3?" · ":" · "))}</span>`;

    const secHtml = s => {
      const named = s.s.length > 0;
      const wolf = s.w ? `<span class="wolf">${esc(u.wolfFlag)}</span>` : "";
      const bl = s.b.map(id=>{
        const ko = (state.showKo && state.lang!=="ko")
          ? `<span class="ko-orig">${esc(KO(id))}</span>` : "";
        return `<li>${hl(T(id),q)}${ko}</li>`;
      }).join("");
      const more = s.n > s.b.length
        ? `<p class="more"><a href="${a.u}" target="_blank" rel="noopener">`+
          `${esc(u.more.replace("{n}", s.n - s.b.length))}</a></p>` : "";
      const tag = named ? s.s.map(x=>u.servers[x]).join(" · ") : u.tagAll;
      return `<div class="sec ${named?"named":"all"}">
        <p class="shead">${hl(T(s.h),q)}${wolf}<span class="stag">${esc(tag)}</span></p>
        <ul>${bl}</ul>${more}</div>`;
    };

    out.push(`<article class="entry ${secs.some(s=>s.s.length)?"named":""}">
      <div class="ehead"><span class="date">${a.d}</span>${badges}</div>
      <p class="etitle"><a href="${a.u}" target="_blank" rel="noopener">${esc(T(a.t))} →</a></p>
      ${secs.map(secHtml).join("")}
    </article>`);
  });

  if(out.length){ $("#ledger").innerHTML = out.join(""); }
  else {
    const hint = (state.onlyNamed && suppressedNamed) ? u.emptyNamed : u.emptyHint;
    $("#ledger").innerHTML = `<div class="empty"><b>${esc(u.emptyTitle)}</b>${esc(hint)}</div>`;
  }
  $("#count").textContent =
    `${u.cntNotices} ${nEntries}${u.unit} · ${u.cntItems} ${nItems.toLocaleString(state.lang)}${u.unitItems}`;
}

D.langs.forEach(l=>{
  const b=document.createElement("button");
  b.type="button"; b.className="lang"; b.dataset.l=l; b.textContent=l.toUpperCase();
  b.onclick=()=>{ state.lang=l; applyLang(); render(); };
  $("#langbar").appendChild(b);
});

$("#q").addEventListener("input", e=>{ state.q=e.target.value; render(); });
$("#onlyNamed").addEventListener("change", e=>{ state.onlyNamed=e.target.checked; render(); });
$("#showKo").addEventListener("change", e=>{ state.showKo=e.target.checked; render(); });
$("#reset").addEventListener("click", ()=>{
  state.q=""; state.servers.clear(); state.months.clear(); state.onlyNamed=false; state.showKo=false;
  $("#q").value=""; $("#onlyNamed").checked=false; $("#showKo").checked=false;
  applyLang(); render();
});

try{
  const saved = localStorage.getItem("pacoca-lang");
  if(saved && D.langs.includes(saved)) state.lang = saved;
  else { const n=(navigator.language||"ko").slice(0,2); if(D.langs.includes(n)) state.lang=n; }
}catch(e){}
applyLang(); render();
</script>
</body>
</html>
